name: Helm Publish
on:
  push:
    branches:
      - main
    paths:
      - charts/**
      - .github/workflows/publish-helm-charts.yaml

jobs:
  release:
    permissions:
      contents: write
      packages: write

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Push k8s-http-routes to forgejo
        uses: bsord/helm-push@v4.1.0
        with:
          username: anurag
          password: ${{ secrets.FORGEJO_PAT }}
          registry-url: "https://git.anurag.sh/api/packages/anurag/helm"
          force: false
          chart-folder: charts/k8s-http-routes

      - name: Push k8s-infisical-secrets to forgejo
        uses: bsord/helm-push@v4.1.0
        with:
          username: anurag
          password: ${{ secrets.FORGEJO_PAT }}
          registry-url: "https://git.anurag.sh/api/packages/anurag/helm"
          force: false
          chart-folder: charts/k8s-infisical-secrets

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v3.18.3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package helm charts
        run: |
          helm package charts/k8s-infisical-secrets
          helm package charts/k8s-http-routes

      - name: Push charts to GHCR
        run: |
          shopt -s nullglob
          for pkg in *.tgz; do
            if [ -z "${pkg:-}" ]; then
              break
            fi
            helm push "${pkg}" "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts"
          done
