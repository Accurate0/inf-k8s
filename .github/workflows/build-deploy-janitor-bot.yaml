name: Build & deploy janitor-bot
on:
  push:
    branches:
      - main
    paths:
      - components/janitor-bot/**
      - .github/workflows/build-deploy-janitor-bot.yaml
  workflow_dispatch:

jobs:
  build:
    permissions:
      packages: write

    uses: Accurate0/workflows/.github/workflows/build-push-docker.yaml@903765c7413c2790ea6fa24aea7cba0e603a1f31 # main
    with:
      directory: ./components/janitor-bot
      image-name: janitor-bot
      docker-build-args: |
        BINARY_NAME=janitor-bot
      use-rust-caching: true

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: components/janitor-bot/target
          key: ${{ runner.os }}-app-target-${{ hashFiles('**/Cargo.lock') }}-janitor-bot
      - run: cargo test
        working-directory: components/janitor-bot

  deploy:
    needs:
      - build
      - test
    uses: Accurate0/workflows/.github/workflows/deploy-app-k8s-v2.yaml@903765c7413c2790ea6fa24aea7cba0e603a1f31 # main
    with:
      service-name: janitor-bot
      images: ghcr.io/accurate0/janitor-bot
      manifests-path: projects/janitor-bot/manifests
      tag: ${{ github.sha }}
    secrets:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_CI_IMAGE_UPDATER }}
