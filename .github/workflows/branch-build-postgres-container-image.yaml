name: Branch build postgres container image
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - system-components/postgres-cluster/container/Dockerfile
      - .github/workflows/branch-build-postgres-container-image.yaml

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: system-components/postgres-cluster/container
          push: false
