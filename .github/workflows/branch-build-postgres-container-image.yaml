name: Branch build postgres container image
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - system-components/postgres-cluster/container/Dockerfile
      - .github/workflows/branch-build-postgres-container-image.yaml

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: system-components/postgres-cluster/container
          push: false
