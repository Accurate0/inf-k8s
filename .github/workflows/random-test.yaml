name: Random Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  random-test:
    runs-on: ubuntu-latest
    steps:
      - name: Roll the dice
        run: |
          RANDOM_NUM=$((RANDOM % 2))
          if [ "$RANDOM_NUM" -eq 0 ]; then
            echo "Lucky! Test passed."
          else
            echo "Unlucky! Test failed."
            exit 1
          fi
