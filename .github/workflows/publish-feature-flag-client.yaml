name: Publish feature-flag-client
on:
  push:
    branches:
      - main
    paths:
      - platform-services/feature-flags/web/client/**
      - .github/workflows/publish-feature-flag-client.yaml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.14.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform-services/feature-flags/web/pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com
          scope: "@accurate0"
      - run: pnpm install --frozen-lockfile
        working-directory: platform-services/feature-flags/web
      - run: pnpm --filter @accurate0/feature-flag-client build
        working-directory: platform-services/feature-flags/web
      - name: Publish if version is new
        working-directory: platform-services/feature-flags/web/client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version --registry https://npm.pkg.github.com > /dev/null 2>&1; then
            echo "$name@$version already published, skipping"
          else
            npm publish
          fi
