name: Deploy pg-db-controller
on:
  push:
    branches:
      - main
    paths:
      - pg-db-controller/**
  workflow_dispatch:

jobs:
  build:
    permissions:
      packages: write

    uses: Accurate0/workflows/.github/workflows/build-push-docker.yaml@main
    with:
      directory: ./pg-db-controller
      image-name: pg-db-controller
      docker-build-args: |
        BINARY_NAME=pg-db-controller
      use-rust-caching: true

  deploy:
    needs:
      - build
    uses: Accurate0/workflows/.github/workflows/deploy-app-k8s-v2.yaml@main
    with:
      service-name: pg-db-controller
      images: ghcr.io/accurate0/pg-db-controller
      tag: ${{ github.sha }}
    secrets:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_CI_IMAGE_UPDATER }}
