name: Build & deploy pg-db-controller
on:
  push:
    branches:
      - main
    paths:
      - components/pg-db-controller/**
      - .github/workflows/build-deploy-pg-db-controller.yaml
  workflow_dispatch:

jobs:
  build:
    permissions:
      packages: write

    uses: Accurate0/workflows/.github/workflows/build-push-docker.yaml@903765c7413c2790ea6fa24aea7cba0e603a1f31 # main
    with:
      directory: ./components/pg-db-controller
      image-name: pg-db-controller
      docker-build-args: |
        BINARY_NAME=pg-db-controller
      use-rust-caching: true

  deploy:
    needs:
      - build
    uses: Accurate0/workflows/.github/workflows/deploy-app-k8s-v2.yaml@903765c7413c2790ea6fa24aea7cba0e603a1f31 # main
    with:
      service-name: pg-db-controller
      images: ghcr.io/accurate0/pg-db-controller
      manifests-path: projects/pg-db-controller/manifests
      tag: ${{ github.sha }}
    secrets:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_CI_IMAGE_UPDATER }}
