name: Build & deploy k8s-schemas
on:
  push:
    branches:
      - main
    paths:
      - platform-services/k8s-schemas/**
      - '!platform-services/k8s-schemas/manifests/**'
      - '!platform-services/k8s-schemas/application.yaml'
      - .github/workflows/build-publish-k8s-schemas.yaml
  workflow_dispatch:

jobs:
  build:
    permissions:
      packages: write

    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-k8s-schemas-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-k8s-schemas

      - name: Docker build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: platform-services/k8s-schemas
          push: true
          tags: |
            ghcr.io/accurate0/k8s-schemas:latest
            ghcr.io/accurate0/k8s-schemas:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,mode=max,dest=/tmp/.buildx-cache-new

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    needs:
      - build
    uses: Accurate0/workflows/.github/workflows/deploy-app-k8s-v2.yaml@9611c57c4fee8a271c037bfc3c9a389d39b52d2f # main
    with:
      service-name: k8s-schemas
      images: ghcr.io/accurate0/k8s-schemas
      manifests-path: platform-services/k8s-schemas/manifests
      tag: ${{ github.sha }}
    secrets:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_CI_IMAGE_UPDATER }}
