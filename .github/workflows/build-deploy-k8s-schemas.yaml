name: Build & deploy k8s-schemas
on:
  push:
    branches:
      - main
    paths:
      - platform-services/k8s-schemas/**
      - '!platform-services/k8s-schemas/manifests/**'
      - '!platform-services/k8s-schemas/application.yaml'
      - .github/workflows/build-publish-k8s-schemas.yaml
  workflow_dispatch:

jobs:
  build:
    permissions:
      packages: write

    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-k8s-schemas-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-k8s-schemas

      - name: Docker build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: platform-services/k8s-schemas
          push: true
          tags: |
            ghcr.io/accurate0/k8s-schemas:latest
            ghcr.io/accurate0/k8s-schemas:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,mode=max,dest=/tmp/.buildx-cache-new

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    needs:
      - build
    uses: Accurate0/workflows/.github/workflows/deploy-app-k8s-v2.yaml@d5901e9bdd4392143298bc1a85e25f33096110f9 # main
    with:
      service-name: k8s-schemas
      images: ghcr.io/accurate0/k8s-schemas
      manifests-path: platform-services/k8s-schemas/manifests
      tag: ${{ github.sha }}
    secrets:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_CI_IMAGE_UPDATER }}
