name: Build & deploy feature-flags-frontend
on:
  push:
    branches:
      - main
    paths:
      - platform-services/feature-flags/web/**
      - .github/workflows/build-deploy-feature-flags-frontend.yaml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./platform-services/feature-flags/web
          file: ./platform-services/feature-flags/web/Dockerfile
          push: true
          tags: ghcr.io/accurate0/feature-flags-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform-services/feature-flags/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: platform-services/feature-flags/web
      - run: pnpm --filter @accurate0/feature-flag-client build
        working-directory: platform-services/feature-flags/web
      - run: pnpm --filter feature-flags-frontend check
        working-directory: platform-services/feature-flags/web

  deploy:
    needs:
      - build
      - check
    uses: Accurate0/workflows/.github/workflows/deploy-app-k8s-v2.yaml@d5901e9bdd4392143298bc1a85e25f33096110f9 # main
    with:
      service-name: feature-flags-frontend
      images: ghcr.io/accurate0/feature-flags-frontend
      manifests-path: platform-services/feature-flags/manifests
      tag: ${{ github.sha }}
    secrets:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_CI_IMAGE_UPDATER }}
