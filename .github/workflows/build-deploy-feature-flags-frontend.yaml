name: Build & deploy feature-flags-frontend
on:
  push:
    branches:
      - main
    paths:
      - platform-services/feature-flags/web/**
      - .github/workflows/build-deploy-feature-flags-frontend.yaml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./platform-services/feature-flags/web
          file: ./platform-services/feature-flags/web/Dockerfile
          push: true
          tags: ghcr.io/accurate0/feature-flags-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform-services/feature-flags/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: platform-services/feature-flags/web
      - run: pnpm --filter @accurate0/feature-flag-client build
        working-directory: platform-services/feature-flags/web
      - run: pnpm --filter feature-flags-frontend check
        working-directory: platform-services/feature-flags/web

  deploy:
    needs:
      - build
      - check
    uses: Accurate0/workflows/.github/workflows/deploy-app-k8s-v2.yaml@1daec34b2444f1c75a17f58ed0a70a148c0def3b # main
    with:
      service-name: feature-flags-frontend
      images: ghcr.io/accurate0/feature-flags-frontend
      manifests-path: platform-services/feature-flags/manifests
      tag: ${{ github.sha }}
    secrets:
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_CI_IMAGE_UPDATER }}
