name: Clean up old images
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  clean:
    runs-on: ubuntu-latest
    name: Delete old images

    permissions:
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch multi-platform package version SHAs
        id: multi-arch-digests
        run: |
          image=$(docker manifest inspect ghcr.io/accurate0/ingress-home | jq -r '.manifests.[] | .digest' | paste -s -d ' ' -)
          pg_db_controller=$(docker manifest inspect ghcr.io/accurate0/pg-db-controller | jq -r '.manifests.[] | .digest' | paste -s -d ' ' -)
          echo "multi-arch-digests=$image,$pg_db_controller" >> $GITHUB_OUTPUT

      - uses: snok/container-retention-policy@3b0972b2276b171b212f8c4efbca59ebba26eceb # v3.0.1
        with:
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: "ingress-home pg-db-controller"
          image-tags: "!latest"
          keep-n-most-recent: 10
          cut-off: 3d
          skip-shas: ${{ steps.multi-arch-digests.outputs.multi-arch-digests }}
