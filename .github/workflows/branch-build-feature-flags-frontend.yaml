name: Branch build feature-flags-frontend
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - platform-services/feature-flags/web/**
      - .github/workflows/branch-build-feature-flags-frontend.yaml

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./platform-services/feature-flags/web
          file: ./platform-services/feature-flags/web/Dockerfile
          push: false

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.13.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform-services/feature-flags/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: platform-services/feature-flags/web
      - run: pnpm --filter @accurate0/feature-flag-client build
        working-directory: platform-services/feature-flags/web
      - run: pnpm --filter feature-flags-frontend check
        working-directory: platform-services/feature-flags/web
