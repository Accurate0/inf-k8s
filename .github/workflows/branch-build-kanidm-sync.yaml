name: Branch build kanidm-sync
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - platform-services/kanidm-sync/**
      - .github/workflows/branch-build-kanidm-sync.yaml

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./platform-services/kanidm-sync
          push: false
          build-args: |
            BINARY_NAME=kanidm-sync
