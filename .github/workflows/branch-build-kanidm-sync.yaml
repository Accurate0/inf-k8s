name: Branch build kanidm-sync
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - platform-services/kanidm-sync/**
      - .github/workflows/branch-build-kanidm-sync.yaml

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./platform-services/kanidm-sync
          push: false
          build-args: |
            BINARY_NAME=kanidm-sync
