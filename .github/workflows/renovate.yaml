name: Renovate
on:
  workflow_dispatch: # Allows manual trigger
    inputs:
      logLevel:
        description: Renovate log level
        type: choice
        default: info
        options:
          - info
          - debug
  schedule:
    - cron: "0 * * * *" # Runs every hour

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@b50d2ba2bd928235abdcc14d06dfafc217f1c565 # v46.1.18
        with:
          configurationFile: platform-services/renovate/config.js
          token: ${{ secrets.FORGEJO_RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_PLATFORM: forgejo
          RENOVATE_ENDPOINT: https://git.anurag.sh
          RENOVATE_AUTODISCOVER: "true"
          GITHUB_COM_TOKEN: ${{ secrets.RENOVATE_GITHUB_COM_TOKEN }}
