name: Branch build ai-gateway
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - platform-services/ai-gateway/**
      - crates/**
      - .github/workflows/branch-build-ai-gateway.yaml

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./platform-services/ai-gateway
          push: false
          build-args: |
            BINARY_NAME=ai-gateway

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      db:
        image: timescale/timescaledb:latest-pg17@sha256:154f1b3915ed050116a85985d5ae1005c8d8bf1562541dc61159610bc05db9a0
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_gateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ai_gateway
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: platform-services/ai-gateway/target
          key: ${{ runner.os }}-app-target-${{ hashFiles('**/Cargo.lock') }}-ai-gateway
      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - run: cargo test
        working-directory: platform-services/ai-gateway
