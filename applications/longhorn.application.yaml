# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        internal-gateway-access: "true"
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - ServerSideApply=true
  project: system-components
  sources:
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      path: applications/longhorn
    - chart: k8s-http-routes
      repoURL: oci://ghcr.io/accurate0/charts/k8s-http-routes
      targetRevision: 2.1.0
      helm:
        valuesObject:
          routes:
            - name: longhorn
              gateway:
                name: internal-gateway
                namespace: envoy-gateway-system
              hostnames:
                - longhorn.inf-k8s.net
              rules:
                - backendRefs:
                    - group: ""
                      kind: Service
                      name: longhorn-frontend
                      port: 80
                      weight: 1
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
    - chart: longhorn
      repoURL: https://charts.longhorn.io/
      targetRevision: 1.11.2
      helm:
        valuesObject:
          global:
            tolerations:
              - key: "inf-k8s.net/architecture"
                operator: "Equal"
                value: "arm64"
                effect: "NoSchedule"
          preUpgradeChecker:
            jobEnabled: false
            upgradeVersionCheck: false
          longhornUI:
            replicas: 1
          defaultSettings:
            taintToleration: inf-k8s.net/architecture=arm64:NoSchedule
          ingress:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system

operation:
  initiatedBy:
    username: github-actions
  sync:
    syncStrategy:
      hook: {}
