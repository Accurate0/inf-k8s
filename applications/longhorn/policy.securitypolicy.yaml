apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: longhorn-security
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: longhorn
  oidc:
    provider:
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: backend-authentik
          port: 443
      backendSettings:
        retry:
          numRetries: 3
          perRetry:
            backOff:
              baseInterval: 1s
              maxInterval: 5s
          retryOn:
            triggers: ["5xx", "gateway-error", "reset"]
      issuer: "https://authentik.inf-k8s.net/application/o/longhorn/"
      authorizationEndpoint: "https://authentik.inf-k8s.net/application/o/authorize/"
      tokenEndpoint: "https://authentik.inf-k8s.net/application/o/token/"
    clientIDRef:
      name: longhorn-managed-secrets
    clientSecret:
      name: longhorn-managed-secrets
    redirectURL: "https://longhorn.inf-k8s.net"
    logoutPath: "/"
