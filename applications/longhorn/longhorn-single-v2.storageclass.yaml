# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/storage.k8s.io/storageclass_v1.json
kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: longhorn-single-v2
provisioner: driver.longhorn.io
allowVolumeExpansion: true
parameters:
  dataLocality: best-effort
  numberOfReplicas: "1"
  fromBackup: ""
  fsType: "ext4"
reclaimPolicy: Retain
