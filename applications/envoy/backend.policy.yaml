apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: shared-gateway-backend-policy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gateway
  mergeType: "StrategicMerge"
  tcpKeepalive:
    probes: 9
    idleTime: "7200s"
    interval: "75s"
