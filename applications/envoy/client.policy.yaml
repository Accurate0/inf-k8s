apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: shared-gateway-client-policy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gateway
  proxyProtocol:
    optional: false
  clientIPDetection:
    customHeader:
      name: CF-Connecting-IP
      failClosed: false
  headers:
    disableRateLimitHeaders: true
    lateResponseHeaders:
      set:
        - name: "x-request-id"
          value: "%REQ(x-request-id)%"
