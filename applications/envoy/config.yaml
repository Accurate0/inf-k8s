apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-proxy-config
  namespace: envoy-gateway-system
spec:
  mergeGateways: true
  provider:
    type: "Kubernetes"
    kubernetes:
      envoyDaemonSet:
        patch:
          value:
            spec:
              template:
                spec:
                  nodeSelector:
                    inf-k8s.net/proxy: "true"
  telemetry:
    tracing:
      samplingRate: 100
      provider:
        backendRefs:
          - group: ""
            kind: Service
            name: monitoring-tempo
            namespace: monitoring
            port: 4317
            weight: 1
        type: OpenTelemetry
      customTags:
        provider:
          type: Literal
          literal:
            value: "otel"
        "k8s.pod.name":
          type: Environment
          environment:
            name: ENVOY_POD_NAME
            defaultValue: "-"
        "k8s.namespace.name":
          type: Environment
          environment:
            name: ENVOY_POD_NAMESPACE
            defaultValue: "envoy-gateway-system"
        # header1:
        #   type: RequestHeader
        #   requestHeader:
        #     name: X-Header-1
        #     defaultValue: "-"
