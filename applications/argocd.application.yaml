# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        internal-gateway-access: "true"
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: default
  sources:
    - chart: k8s-http-routes
      repoURL: oci://ghcr.io/accurate0/charts/k8s-http-routes
      targetRevision: 2.1.0
      helm:
        valuesObject:
          routes:
            - name: argocd-server
              gateway:
                name: internal-gateway
                namespace: envoy-gateway-system
              hostnames:
                - argocd.inf-k8s.net
              rules:
                - backendRefs:
                    - group: ""
                      kind: Service
                      name: argocd-server
                      port: 80
                      weight: 1
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
    - chart: k8s-infisical-secrets
      repoURL: oci://ghcr.io/accurate0/charts/k8s-infisical-secrets
      targetRevision: 0.10.0
      helm:
        valuesObject:
          defaults:
            namespace: argocd
            projectSlug: argo-cd-d-yw-k
            resyncInterval: 900
          secrets:
            - name: argocd-secrets
              labels:
                app.kubernetes.io/part-of: argocd
              secretPath: /
              managedSecrets:
                - secretName: argocd-managed-secrets
    - chart: argo-cd
      repoURL: https://argoproj.github.io/argo-helm
      targetRevision: 9.5.14
      helm:
        valuesObject:
          global:
            domain: argocd.inf-k8s.net

          configs:
            cm:
              admin.enabled: false
              accounts.anurag.enabled: false
              accounts.janitor: apiKey
              dex.config: |
                connectors:
                - config:
                    issuer: https://authentik.inf-k8s.net/application/o/argo-cd/
                    clientID: $argocd-managed-secrets:AUTHENTIK_CLIENT_ID
                    clientSecret: $argocd-managed-secrets:AUTHENTIK_CLIENT_SECRET
                    insecureEnableGroups: true
                    scopes:
                      - openid
                      - profile
                      - email
                  name: authentik
                  type: oidc
                  id: authentik
            rbac:
              policy.csv: |
                g, ArgoCD Admins, role:admin
                p, github-actions, applications, sync, default/*, allow
                p, github-actions, applications, get, default/*, allow
                p, github-actions, projects, get, *, allow
                p, janitor, applications, get, default/*, allow
                p, janitor, projects, get, *, allow
            params:
              server.insecure: true

          notifications:
            enabled: true
            secret:
              create: false
              name: argocd-managed-secrets
            subscriptions:
              - recipients:
                  - janitor-bot
                triggers:
                  - on-sync-succeeded
                  - on-sync-failed
            notifiers:
              service.webhook.janitor-bot: |
                url: http://api.janitor-bot.svc.cluster.local/argocd/webhook
                headers:
                  - name: Content-Type
                    value: application/json
                  - name: Authorization
                    value: $ARGOCD_JANITOR_WEBHOOK_SECRET
            templates:
              template.sync-status: |
                webhook:
                  janitor-bot:
                    method: POST
                    body: |
                      {
                        "app_name": "{{.app.metadata.name}}",
                        "sha": "{{if .app.status.sync.revision}}{{.app.status.sync.revision}}{{else}}{{range $i, $src := .app.spec.sources}}{{if eq (default "" $src.repoURL) "https://github.com/Accurate0/inf-k8s.git"}}{{index $.app.status.operationState.syncResult.revisions $i}}{{end}}{{end}}{{end}}",
                        "sync_status": "{{.app.status.sync.status}}",
                        "health_status": "{{.app.status.health.status}}",
                        "phase": "{{.app.status.operationState.phase}}",
                        "message": "{{.app.status.operationState.message}}"
                      }
            triggers:
              trigger.on-sync-succeeded: |
                - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
                  send: [sync-status]
              trigger.on-sync-failed: |
                - when: app.status.operationState.phase in ['Failed', 'Error']
                  send: [sync-status]

          server:
            ingress:
              enabled: false
              ingressClassName: nginx
              annotations:
                cert-manager.io/cluster-issuer: letsencrypt-prod
                nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
                nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
              extraTls:
                - hosts:
                    - argocd.inf-k8s.net
                  secretName: argocd-inf-k8s-tls

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

operation:
  initiatedBy:
    username: github-actions
  sync:
    syncStrategy:
      hook: {}
