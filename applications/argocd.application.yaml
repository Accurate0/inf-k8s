apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        internal-gateway-access: "true"
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - ServerSideApply=true
  project: default
  sources:
    - chart: k8s-http-routes
      repoURL: https://accurate0.github.io/inf-k8s
      targetRevision: 2.0.0
      helm:
        valuesObject:
          routes:
            - name: argocd-server
              gateway:
                name: internal-gateway
                namespace: envoy-gateway-system
              hostnames:
                - argocd.inf-k8s.net
              rules:
                - backendRefs:
                    - group: ""
                      kind: Service
                      name: argocd-server
                      port: 80
                      weight: 1
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
    - chart: k8s-infisical-secrets
      repoURL: https://accurate0.github.io/inf-k8s
      targetRevision: 0.8.0
      helm:
        valuesObject:
          defaults:
            namespace: argocd
            projectSlug: argo-cd-d-yw-k
            resyncInterval: 900
          secrets:
            - name: argocd-secrets
              labels:
                app.kubernetes.io/part-of: argocd
              secretPath: /
              managedSecrets:
                - secretName: argocd-managed-secrets
    - chart: argo-cd
      repoURL: https://argoproj.github.io/argo-helm
      targetRevision: 9.4.4
      helm:
        valuesObject:
          global:
            domain: argocd.inf-k8s.net

          configs:
            cm:
              admin.enabled: false
              accounts.anurag.enabled: false
              dex.config: |
                connectors:
                - config:
                    issuer: https://authentik.inf-k8s.net/application/o/argo-cd/
                    clientID: $argocd-managed-secrets:AUTHENTIK_CLIENT_ID
                    clientSecret: $argocd-managed-secrets:AUTHENTIK_CLIENT_SECRET
                    insecureEnableGroups: true
                    scopes:
                      - openid
                      - profile
                      - email
                  name: authentik
                  type: oidc
                  id: authentik
            rbac:
              policy.csv: |
                g, ArgoCD Admins, role:admin
                p, github-actions, applications, sync, default/*, allow
                p, github-actions, applications, get, default/*, allow
                p, github-actions, projects, get, *, allow
            params:
              server.insecure: true

          server:
            ingress:
              enabled: false
              ingressClassName: nginx
              annotations:
                cert-manager.io/cluster-issuer: letsencrypt-prod
                nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
                nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
              extraTls:
                - hosts:
                    - argocd.inf-k8s.net
                  secretName: argocd-inf-k8s-tls

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

operation:
  initiatedBy:
    username: github-actions
  sync:
    syncStrategy:
      hook: {}
