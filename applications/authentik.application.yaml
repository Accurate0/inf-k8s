apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        internal-gateway-access: "true"
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - ServerSideApply=true
  project: default
  sources:
    # - chart: k8s-http-routes
    #   repoURL: https://accurate0.github.io/inf-k8s
    #   targetRevision: 2.0.0
    #   helm:
    #     valuesObject:
    #       routes:
    #         - name: authentik
    #           gateway:
    #             name: internal-gateway
    #             namespace: envoy-gateway-system
    #           hostnames:
    #             - authentik.inf-k8s.net
    #           rules:
    #             - backendRefs:
    #                 - group: ""
    #                   kind: Service
    #                   name: argocd-server
    #                   port: 80
    #                   weight: 1
    #               matches:
    #                 - path:
    #                     type: PathPrefix
    #                     value: /
    - chart: k8s-infisical-secrets
      repoURL: https://accurate0.github.io/inf-k8s
      targetRevision: 0.5.0
      helm:
        valuesObject:
          defaults:
            namespace: authentik
            projectSlug: authentik-bjrx
            resyncInterval: 900
          secrets:
            - name: authentik-secrets
              secretPath: /
              managedSecrets:
                - secretName: authentik-managed-secrets
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      path: applications/authentik
    # - chart: authentik
    #   repoURL: https://charts.goauthentik.io
    #   targetRevision: 2026.2.2
    #   helm:
    #     valuesObject:
    #       global:
    #         envFrom:
    #           - secretRef:
    #               name: authentik-managed-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: authentik

operation:
  initiatedBy:
    username: github-actions
  sync:
    syncStrategy:
      hook: {}
