apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: argocd
spec:
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        internal-gateway-access: "true"
        shared-gateway-access: "true"
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - ServerSideApply=true
  project: default
  sources:
    - chart: k8s-infisical-secrets
      repoURL: https://accurate0.github.io/inf-k8s
      targetRevision: 0.10.0
      helm:
        valuesObject:
          defaults:
            namespace: forgejo
            projectSlug: forgejo-lmh-v
            resyncInterval: 900
          secrets:
            - name: forgejo-gpg-secrets
              secretPath: /gpg
              managedSecrets:
                - secretName: forgejo-gpg-managed-secrets
                  template:
                    includeAllSecrets: false
                    data:
                      privateKey: "{{ .GPG_PRIVATE_KEY.Value }}"
            - name: forgejo-oauth-secrets
              secretPath: /oauth
              managedSecrets:
                - secretName: forgejo-oauth-managed-secrets
                  template:
                    includeAllSecrets: false
                    data:
                      key: "{{ .AUTHENTIK_CLIENT_ID.Value }}"
                      secret: "{{ .AUTHENTIK_CLIENT_SECRET.Value }}"
            - name: forgejo-secrets
              secretPath: /
              managedSecrets:
                - secretName: forgejo-managed-secrets
    - chart: forgejo
      repoURL: oci://code.forgejo.org/forgejo-helm/forgejo
      targetRevision: 17.0.1
      helm:
        valuesObject:
          replicaCount: 1
          topologySpreadConstraints:
            - topologyKey: inf-k8s.net/location
              whenUnsatisfiable: ScheduleAnyway
              maxSkew: 1
              nodeTaintsPolicy: Honor
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: forgejo

          httpRoute:
            enabled: true
            parentRefs:
              - name: internal-gateway
                namespace: envoy-gateway-system
              - name: shared-gateway
                namespace: envoy-gateway-system
            hostnames:
              - git.inf-k8s.net
              - git.anurag.sh
          tcpRoute:
            enabled: true
            parentRefs:
              - name: internal-gateway
                namespace: envoy-gateway-system
                sectionName: git-ssh
              - name: shared-gateway
                namespace: envoy-gateway-system
                sectionName: git-ssh
          persistence:
            enabled: true
            storageClass: longhorn-replicated
            accessModes:
              - ReadWriteOnce
          signing:
            enabled: true
            existingSecret: forgejo-gpg-managed-secrets
          gitea:
            admin:
              username: ""
              existingSecret: ""
            config:
              storage:
                STORAGE_TYPE: minio
                MINIO_BUCKET: forgejo-storage
                MINIO_USE_SSL: "true"
              database:
                DB_TYPE: postgres
              oauth2_client:
                ENABLE_AUTO_REGISTRATION: "true"
              openid:
                ENABLE_OPENID_SIGNUP: "false"
              service:
                DISABLE_REGISTRATION: "true"
            additionalConfigFromEnvs:
              - name: FORGEJO__STORAGE__MINIO_ENDPOINT
                valueFrom:
                  secretKeyRef:
                    name: forgejo-managed-secrets
                    key: MINIO_ENDPOINT
              - name: FORGEJO__STORAGE__MINIO_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: forgejo-managed-secrets
                    key: MINIO_ACCESS_KEY_ID
              - name: FORGEJO__STORAGE__MINIO_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: forgejo-managed-secrets
                    key: MINIO_SECRET_ACCESS_KEY

              - name: FORGEJO__DATABASE__NAME
                valueFrom:
                  secretKeyRef:
                    name: forgejo-database-secret
                    key: PGDATABASE
              - name: FORGEJO__DATABASE__USER
                valueFrom:
                  secretKeyRef:
                    name: forgejo-database-secret
                    key: PGUSER
              - name: FORGEJO__DATABASE__HOST
                valueFrom:
                  secretKeyRef:
                    name: forgejo-database-secret
                    key: PGHOST
              - name: FORGEJO__DATABASE__PASSWD
                valueFrom:
                  secretKeyRef:
                    name: forgejo-database-secret
                    key: PGPASSWORD
            metrics:
              enabled: true
              serviceMonitor:
                enabled: true
            oauth:
              - name: "authentik"
                provider: "openidConnect"
                existingSecret: forgejo-oauth-managed-secrets
                autoDiscoverUrl: "https://authentik.inf-k8s.net/application/o/forgejo/.well-known/openid-configuration"
                scopes: "email profile forgejo"
                requiredClaimName: forgejo
                groupClaimName: "forgejo"
                adminGroup: "admin"
                restrictedGroup: "restricted"
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      path: applications/forgejo

  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo

operation:
  initiatedBy:
    username: github-actions
  sync:
    syncStrategy:
      hook: {}
