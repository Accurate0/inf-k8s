apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: argocd
spec:
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        internal-gateway-access: "true"
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - ServerSideApply=true
  project: default
  sources:
    - chart: k8s-infisical-secrets
      repoURL: https://accurate0.github.io/inf-k8s
      targetRevision: 0.10.0
      helm:
        valuesObject:
          defaults:
            namespace: forgejo
            projectSlug: forgejo-lmh-v
            resyncInterval: 900
          secrets:
            - name: forgejo-oauth-secrets
              secretPath: /oauth
              managedSecrets:
                - secretName: forgejo-oauth-managed-secrets
              template:
                includeAllSecrets: false
                data:
                  key: "{{ .AUTHENTIK_CLIENT_ID.Value }}"
                  secret: "{{ .AUTHENTIK_CLIENT_SECRET.Value }}"
            - name: forgejo-secrets
              secretPath: /
              managedSecrets:
                - secretName: forgejo-managed-secrets
    - chart: forgejo
      repoURL: oci://code.forgejo.org/forgejo-helm/forgejo
      targetRevision: 17.0.1
      helm:
        valuesObject:
          httpRoute:
            enabled: true
            parentRefs:
              - name: internal-gateway
                namespace: envoy-gateway-system
            hostnames:
              - git.inf-k8s.net
          tcpRoute:
            enabled: false
            parentRefs:
              - name: internal-gateway
                namespace: envoy-gateway-system
                sectionName: ssh
          persistence:
            enabled: true
            storageClass: longhorn-replicated
          gitea:
            config:
              database:
                HOST: cloudnative-pg-cluster-rw.cnpg-system.svc.cluster.local
            additionalConfigFromEnvs:
              - name: FORGEJO__DATABASE__PASSWD
                valueFrom:
                  secretKeyRef:
                    name: forgejo-database-secret
                    key: PGPASSWORD
            metrics:
              enabled: true
              serviceMonitor:
                enabled: true
            oauth:
              - name: "Authentik"
                provider: "openidConnect"
                existingSecret: forgejo-oauth-managed-secrets
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      path: applications/forgejo

  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo

operation:
  initiatedBy:
    username: github-actions
  sync:
    syncStrategy:
      hook: {}
