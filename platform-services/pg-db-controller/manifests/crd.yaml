# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/apiextensions.k8s.io/customresourcedefinition_v1.json
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: postgresdatabases.inf-k8s.net
spec:
  group: inf-k8s.net
  names:
    categories:
    - databases
    kind: PostgresDatabase
    plural: postgresdatabases
    shortNames:
    - pgdb
    singular: postgresdatabase
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.databaseName
      name: Database
      type: string
    - jsonPath: .status.conditions[?(@.type=="Programmed")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for PgDatabaseSpec via `CustomResource`
        properties:
          spec:
            properties:
              databaseName:
                pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                type: string
              roleName:
                nullable: true
                pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                type: string
              secretName:
                type: string
              secretNamespace:
                type: string
            required:
            - databaseName
            - secretName
            - secretNamespace
            type: object
          status:
            nullable: true
            properties:
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - observedGeneration
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        required:
        - spec
        title: PostgresDatabase
        type: object
    served: true
    storage: true
    subresources:
      status: {}
