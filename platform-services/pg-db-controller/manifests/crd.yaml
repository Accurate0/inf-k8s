# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/apiextensions.k8s.io/customresourcedefinition_v1.json
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: postgresdatabases.inf-k8s.net
spec:
  group: inf-k8s.net
  names:
    categories:
    - databases
    kind: PostgresDatabase
    plural: postgresdatabases
    shortNames:
    - pgdb
    singular: postgresdatabase
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.databaseName
      name: Database
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for PgDatabaseSpec via `CustomResource`
        properties:
          spec:
            properties:
              databaseName:
                pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                type: string
              roleName:
                nullable: true
                pattern: ^[A-Za-z_][A-Za-z0-9_]*$
                type: string
              secretName:
                type: string
              secretNamespace:
                type: string
            required:
            - databaseName
            - secretName
            - secretNamespace
            type: object
          status:
            nullable: true
            properties:
              message:
                nullable: true
                type: string
              observedGeneration:
                format: int64
                nullable: true
                type: integer
              phase:
                enum:
                - Pending
                - Ready
                - Error
                type: string
              ready:
                type: boolean
              secretRef:
                nullable: true
                type: string
            required:
            - phase
            - ready
            type: object
        required:
        - spec
        title: PostgresDatabase
        type: object
    served: true
    storage: true
    subresources:
      status: {}
