# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pg-db-controller
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: platform-services
  source:
    repoURL: https://github.com/Accurate0/inf-k8s.git
    path: platform-services/pg-db-controller/manifests
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: pg-db-controller
operation:
  initiatedBy:
    username: github-actions
  sync:
    prune: true
    syncStrategy:
      hook: {}
