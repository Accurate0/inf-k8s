# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/gateway.envoyproxy.io/securitypolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: ingress-home-oidc
  namespace: ingress-home
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: inf-k8s-route
  oidc:
    provider:
      issuer: https://idm.anurag.sh/oauth2/openid/ingress-home
    clientIDRef:
      name: kanidm-ingress-home-oidc
    clientSecret:
      name: kanidm-ingress-home-oidc
    redirectURL: https://inf-k8s.net/oauth2/callback
    scopes:
      - openid
      - email
      - profile
