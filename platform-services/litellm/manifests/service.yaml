# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/core/service_v1.json
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: litellm
spec:
  selector:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
  trafficDistribution: PreferSameNode
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
      appProtocol: http
