segments:
  - key: adult-anz
    name: Adults in ANZ
    constraints:
      - {attribute: age, operator: gte, values: [18]}
      - {attribute: country, operator: in, values: ["AU", "NZ"]}

flags:
  - key: new-checkout
    value_type: boolean
    default_variant: "off"
    variants:
      - {key: "on", value: true}
      - {key: "off", value: false}
    rules:
      - segment: adult-anz
        variant: "on"

resolve:
  kind: boolean
  flag_key: new-checkout
  context:
    targeting_key: user-1
    attributes:
      age: 30
      country: AU
