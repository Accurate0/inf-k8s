segments:
  - key: pro-plan
    name: Pro plan
    constraints:
      - {attribute: plan, operator: eq, values: ["pro"]}

flags:
  - key: new-checkout
    value_type: boolean
    default_variant: "off"
    variants:
      - {key: "on", value: true}
      - {key: "off", value: false}
    rules:
      - segment: pro-plan
        variant: "on"
        constraint_groups:
          - - {attribute: age, operator: gte, values: [18]}

resolve:
  kind: boolean
  flag_key: new-checkout
  context:
    targeting_key: user-2
    attributes:
      plan: pro
      age: 16
