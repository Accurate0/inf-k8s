# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/gateway.envoyproxy.io/securitypolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: feature-flags-oidc
  namespace: feature-flags
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: feature-flags-frontend
  oidc:
    provider:
      issuer: https://idm.anurag.sh/oauth2/openid/feature-flags
    clientIDRef:
      name: kanidm-feature-flags-oidc
    clientSecret:
      name: kanidm-feature-flags-oidc
    redirectURL: https://feature-flags.inf-k8s.net/oauth2/callback
    scopes:
      - openid
      - email
      - profile
    # Forward the token to the backend so the jwt filter below can read it and
    # project the user's username into a request header for the audit log.
    forwardAccessToken: true
  jwt:
    providers:
      - name: kanidm
        issuer: https://idm.anurag.sh/oauth2/openid/feature-flags
        remoteJWKS:
          cacheDuration: 3600s
          uri: https://idm.anurag.sh/oauth2/openid/feature-flags/public_key.jwk
        claimToHeaders:
          - claim: preferred_username
            header: x-forwarded-user
