# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-gateway
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: platform-services
  sources:
    - chart: k8s-http-routes
      repoURL: oci://ghcr.io/accurate0/charts/k8s-http-routes
      targetRevision: 2.2.0
      helm:
        valuesObject:
          routes:
            - name: ai-gateway
              gateway:
                name: internal-gateway
                namespace: envoy-gateway-system
              hostnames:
                - ai-gateway.inf-k8s.net
              rules:
                - backendRefs:
                    - group: ""
                      kind: Service
                      name: api
                      port: 80
                      weight: 1
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      path: platform-services/ai-gateway/manifests
      kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-gateway
operation:
  initiatedBy:
    username: github-actions
  sync:
    prune: true
    syncStrategy:
      hook: {}
