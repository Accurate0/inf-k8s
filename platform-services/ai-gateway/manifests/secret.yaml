apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-gateway-managed-secrets
  namespace: ai-gateway
spec:
  refreshInterval: 900s
  target:
    name: ai-gateway-managed-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - sourceRef:
        storeRef:
          name: infisical-ai-gateway-secret
          kind: SecretStore
      find:
        conversionStrategy: Default
        decodingStrategy: None
        name:
          regexp: ".*"
        nullBytePolicy: Ignore
    - sourceRef:
        storeRef:
          name: infisical-litellm-secret
          kind: SecretStore
      find:
        conversionStrategy: Default
        decodingStrategy: None
        name:
          regexp: ".*"
        nullBytePolicy: Ignore
