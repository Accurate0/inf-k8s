# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/core/service_v1.json
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ai-gateway
  labels:
    app: ai-gateway
spec:
  selector:
    app: ai-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
