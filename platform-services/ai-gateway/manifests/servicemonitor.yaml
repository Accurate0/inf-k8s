# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-gateway
  namespace: ai-gateway
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: ai-gateway
  namespaceSelector:
    matchNames:
      - ai-gateway
  endpoints:
    - port: http
      path: /admin/metrics
      interval: 30s
      scrapeTimeout: 10s
