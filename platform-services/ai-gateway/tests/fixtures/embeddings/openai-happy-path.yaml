endpoint: /v1/embeddings
provider:
  dialect: openai
  models:
    - text-embedding-3-small
request:
  model: text-embedding-3-small
  input: hello world
upstream:
  status: 200
  body:
    object: list
    model: text-embedding-3-small
    data:
      - object: embedding
        index: 0
        embedding:
          - 0.1
          - 0.2
    usage:
      prompt_tokens: 2
      total_tokens: 2
