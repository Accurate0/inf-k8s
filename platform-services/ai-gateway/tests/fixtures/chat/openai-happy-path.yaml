endpoint: /v1/chat/completions
provider:
  dialect: openai
  models:
    - gpt-4o
request:
  model: gpt-4o
  messages:
    - role: user
      content: hello
upstream:
  status: 200
  body:
    id: chatcmpl-01
    object: chat.completion
    model: gpt-4o
    choices:
      - index: 0
        finish_reason: stop
        message:
          role: assistant
          content: hi there
    usage:
      prompt_tokens: 9
      completion_tokens: 4
      total_tokens: 13
