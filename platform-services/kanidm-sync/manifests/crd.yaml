apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kanidmoauth2clients.inf-k8s.net
spec:
  group: inf-k8s.net
  names:
    kind: KanidmOAuth2Client
    plural: kanidmoauth2clients
    singular: kanidmoauth2client
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.name
      name: Name
      type: string
    - jsonPath: .status.conditions[?(@.type=="Programmed")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for KanidmOAuth2ClientSpec via `CustomResource`
        properties:
          spec:
            properties:
              allowInsecureClientDisablePkce:
                default: false
                description: Disable the PKCE requirement for confidential clients that don't support it.
                type: boolean
              claimMaps:
                additionalProperties:
                  properties:
                    join:
                      default: array
                      description: How a member's values are joined in the emitted claim.
                      enum:
                      - array
                      - csv
                      - ssv
                      type: string
                    valuesByGroup:
                      additionalProperties:
                        items:
                          type: string
                        type: array
                      description: Group name -> claim values contributed by that group's members.
                      type: object
                  required:
                  - valuesByGroup
                  type: object
                default: {}
                description: |-
                  Claim name -> group-membership-derived claim values. Lets an app
                  auto-promote members of a kanidm group (e.g. expose a "forgejo" claim
                  containing "admin" for platform_admins so Forgejo grants them admin).
                type: object
              displayName:
                type: string
              enableLegacyCrypto:
                default: false
                description: |-
                  Sign tokens with RS256 instead of the default ES256. Some OIDC clients
                  (e.g. Flipt's go-oidc) only accept RS256.
                type: boolean
              icon:
                description: Optional app icon/logo, sourced from a ConfigMap.
                nullable: true
                properties:
                  configMap:
                    description: ConfigMap name holding the image.
                    type: string
                  key:
                    description: |-
                      Key within the ConfigMap; its file extension sets the image type
                      (e.g. "Forgejo.svg" -> Svg).
                    type: string
                  namespace:
                    description: Namespace of the ConfigMap. Defaults to the CR's own namespace.
                    nullable: true
                    type: string
                required:
                - configMap
                - key
                type: object
              name:
                description: The kanidm resource server name (lowercase, e.g. "forgejo").
                type: string
              origin:
                description: Landing/origin URL (oauth2_rs_origin_landing).
                type: string
              preferShortUsername:
                default: false
                description: Expose the short username (instead of the SPN) as preferred_username.
                type: boolean
              public:
                default: false
                description: Public (PKCE-only, no secret) client. Defaults to false (confidential).
                type: boolean
              redirectUrls:
                description: Exact redirect/callback URLs (oauth2_rs_origin). Strict matching is enforced.
                items:
                  type: string
                type: array
              scopeMaps:
                additionalProperties:
                  items:
                    type: string
                  type: array
                default: {}
                description: Group name -> OIDC scopes granted to its members.
                type: object
              secretKeys:
                default:
                  clientId: clientId
                  clientSecret: clientSecret
                  issuerUrl: issuerUrl
                description: Override the key names used in the written Secret (e.g. Forgejo wants key/secret).
                properties:
                  clientId:
                    default: clientId
                    type: string
                  clientSecret:
                    default: clientSecret
                    type: string
                  issuerUrl:
                    default: issuerUrl
                    type: string
                type: object
              secretLabels:
                additionalProperties:
                  type: string
                default: {}
                description: |-
                  Extra labels to set on the written Secret (e.g. Argo CD needs
                  app.kubernetes.io/part-of: argocd to read it).
                type: object
              secretName:
                description: Secret to write (clientId/clientSecret/issuerUrl by default).
                type: string
              secretNamespace:
                type: string
            required:
            - displayName
            - name
            - origin
            - redirectUrls
            - secretName
            - secretNamespace
            type: object
            x-kubernetes-validations:
            - message: spec.name must not be empty
              rule: self.name != ""
            - message: spec.redirectUrls must contain at least one URL
              rule: self.redirectUrls.size() > 0
          status:
            nullable: true
            properties:
              conditions:
                items:
                  description: Standard Kubernetes condition (matches `metav1.Condition`).
                  properties:
                    lastTransitionTime:
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - observedGeneration
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        required:
        - spec
        title: KanidmOAuth2Client
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
