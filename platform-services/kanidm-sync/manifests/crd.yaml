apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kanidmoauth2clients.inf-k8s.net
spec:
  group: inf-k8s.net
  names:
    kind: KanidmOAuth2Client
    plural: kanidmoauth2clients
    singular: kanidmoauth2client
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for KanidmOAuth2ClientSpec via `CustomResource`
        properties:
          spec:
            properties:
              allowInsecureClientDisablePkce:
                default: false
                description: Disable the PKCE requirement for confidential clients that don't support it.
                type: boolean
              displayName:
                type: string
              name:
                description: The kanidm resource server name (lowercase, e.g. "forgejo").
                type: string
              origin:
                description: Landing/origin URL (oauth2_rs_origin_landing).
                type: string
              preferShortUsername:
                default: false
                description: Expose the short username (instead of the SPN) as preferred_username.
                type: boolean
              public:
                default: false
                description: Public (PKCE-only, no secret) client. Defaults to false (confidential).
                type: boolean
              redirectUrls:
                description: Exact redirect/callback URLs (oauth2_rs_origin). Strict matching is enforced.
                items:
                  type: string
                type: array
              scopeMaps:
                additionalProperties:
                  items:
                    type: string
                  type: array
                default: {}
                description: Group name -> OIDC scopes granted to its members.
                type: object
              secretName:
                description: Canonical Secret to write (clientId/clientSecret/issuerUrl).
                type: string
              secretNamespace:
                type: string
            required:
            - displayName
            - name
            - origin
            - redirectUrls
            - secretName
            - secretNamespace
            type: object
          status:
            nullable: true
            properties:
              provisioned:
                type: boolean
            required:
            - provisioned
            type: object
        required:
        - spec
        title: KanidmOAuth2Client
        type: object
    served: true
    storage: true
    subresources:
      status: {}
