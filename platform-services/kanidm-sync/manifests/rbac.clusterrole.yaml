# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/rbac.authorization.k8s.io/clusterrole_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kanidm-sync-access
rules:
  - apiGroups:
      - "inf-k8s.net"
    resources:
      - kanidmoauth2clients
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - "inf-k8s.net"
    resources:
      - kanidmoauth2clients/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - create
      - update
      - patch
