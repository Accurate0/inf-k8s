# yaml-language-server: $schema=../rule.schema.json
name: argocd-diff-renovate
priority: 10
when:
  all:
    - type: event
      kind: pr
      source: forgejo
    - type: repository
      value: anurag/k8s
    - type: author
      value: renovate
    - type: target_branch
      value: main
    - type: is_open
    - type: has_changed_files
    - type: changed_files_any_match
      patterns:
        - "system-components/*.application.yaml"
actions:
  - run:
      - type: argocd_diff
