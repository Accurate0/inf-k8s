# yaml-language-server: $schema=./rule.schema.json
name: clear-janitor-labels-on-merge
when:
  all:
    - type: event
      kind: pr
      source: forgejo
    - any:
        - type: repository
          value: anurag/home-gateway
        - type: repository
          value: anurag/k8s
        - type: repository
          value: anurag/solar-panels
    - type: action
      value: closed
    - type: is_merged
actions:
  - run:
      - type: remove_labels
        prefixes: ["janitor/"]
