# yaml-language-server: $schema=../rule.schema.json
name: automerge-renovate-terraform
when:
  all:
    - type: event
      kind: pr
      source: forgejo
    - type: repository
      value: anurag/k8s
    - type: feature_flag
      name: allow_automerging_rules
      default: true
    - type: target_branch
      value: main
    - type: author
      value: renovate
    - type: changed_files_all_match
      patterns:
        - "terraform/**"
    - not:
        type: has_label
        value: update-major
    - not:
        type: has_label
        value: conflicts
    - type: is_open
    - not:
        type: bot.has_approved
    - type: status_checks
      names:
        - "Trivy scan / Trivy (pull_request)"
        - "Terraform plan / tofu plan (pull_request)"
      state: success
    - type: bot.comment_contains
      marker: "<!-- terraform-plan -->"
      value: "No changes. Your infrastructure matches the configuration."
actions:
  - run:
      - type: approve
      - type: merge
        strategy: squash
        delete_branch: true
