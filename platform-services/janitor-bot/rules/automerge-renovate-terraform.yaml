# yaml-language-server: $schema=../rule.schema.json
name: automerge-renovate-terraform
enabled: true
matches:
  all:
    - type: forgejo
    - type: pr_event
    - type: repository
      value: anurag/k8s
    - type: feature_flag
      name: allow_automerging_rules
      default: true
    - type: target_branch
      value: main
    - type: author
      value: renovate
    - type: changed_files_all_match
      patterns:
        - "terraform/**"
    - not:
        type: has_label
        value: update-major
    - not:
        type: has_label
        value: conflicts
    - type: is_open
    - type: not_approved_by_self
    - type: status_checks
      names:
        - "Trivy scan / Trivy"
        - "Terraform plan / tofu plan"
      state: success
actions:
  - type: approve
  - type: merge
    strategy: squash
    delete_branch: true
