# yaml-language-server: $schema=../rule.schema.json
name: retry-renovate-workflow
enabled: true
matches:
  all:
    - type: github
    - type: workflow_event
    - type: repository
      value: Accurate0/inf-k8s
    - type: target_branch
      value: main
    - type: workflow_conclusion
      value: failure
    - type: title_matches
      value: renovate
    - type: workflow_run_attempt
      expr: "value < 3"
actions:
  - type: retry_workflow
    target: github
    repository:
      content: "{repository}"
      template: true
    id:
      content: "{github_workflow.run_id}"
      template: true
