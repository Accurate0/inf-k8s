# yaml-language-server: $schema=./rule.schema.json
name: retry-renovate-workflow
when:
  all:
    - type: event
      kind: workflow
      source: github
    - type: repository
      value: Accurate0/inf-k8s
    - type: target_branch
      value: main
    - type: workflow_conclusion
      value: failure
    - type: title_matches
      value: renovate
    - type: workflow_run_attempt
      expr: "value < 3"
actions:
  - run:
      - type: retry_workflow
        target: github
        repository: "{repository}"
        id: "{github_workflow.run_id}"
