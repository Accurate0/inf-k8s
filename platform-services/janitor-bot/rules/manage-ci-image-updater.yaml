# yaml-language-server: $schema=./rule.schema.json
name: manage-ci-image-updater
when:
  all:
    - type: event
      kind: pr
      source: forgejo
    - type: repository
      value: anurag/k8s
    - type: feature_flag
      name: janitor-bot-allow-automerging-rules
      default: true
    - type: target_branch
      value: main
    - type: author
      value: ci-image-updater
    - not:
        type: has_conflicts
    - type: is_open
    - type: is_latest_by_metadata
      match_metadata_fields: [service]
actions:
  - run:
      - type: close_other_prs
        author: ci-image-updater
        criteria: older
        match_metadata_fields: [service]
        delete_branch: true
        comment: "Superseded by #{forgejo_pr.pr_number}"
  - when:
      all:
        - ref: global.perth_evening
        - not:
            type: bot.has_approved
    run:
      - type: remove_labels
        labels: [janitor/queued]
      - type: add_labels
        labels: [image-update, automated]
      - type: approve
        comment: "Auto-approved: PR from ci-image-updater"
      - type: merge
        strategy: squash
        delete_branch: true
  - when:
      all:
        - not:
            ref: global.perth_evening
        - not:
            type: has_label
            value: janitor/queued
    run:
      - type: add_labels
        labels: [janitor/queued]
