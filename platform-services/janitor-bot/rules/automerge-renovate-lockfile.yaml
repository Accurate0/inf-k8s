# yaml-language-server: $schema=./rule.schema.json
name: automerge-renovate-lockfile
when:
  all:
    - type: event
      kind: pr
      source: forgejo
    - any:
        - type: repository
          value: anurag/home-gateway
        - type: repository
          value: anurag/k8s
    - type: feature_flag
      name: allow_automerging_rules
      default: true
    - type: target_branch
      value: main
    - type: author
      value: renovate
    - type: has_label
      value: renovate/lockfile
    - not:
        type: has_conflicts
    - type: is_open
    - not:
        type: bot.has_approved
    - type: has_status_checks
    - type: all_status_checks_passed
actions:
  - run:
      - type: approve
      - type: merge
        strategy: squash
        delete_branch: true
