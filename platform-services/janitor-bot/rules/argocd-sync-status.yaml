# yaml-language-server: $schema=../rule.schema.json
name: argocd-sync-status
when:
  all:
    - type: event
      kind: sync
      source: argocd
    - type: app_changed_in_commit
      owner: anurag
      repo: k8s
actions:
  - run:
      - type: set_commit_status
        target:
          owner: anurag
          repo: k8s
        sha: "{sha}"
        state: "{state}"
        context: "ArgoCD / sync / {argocd_sync.app_name}"
        description: "{description}"
        target_url: "https://argocd.inf-k8s.net/applications/argocd/{argocd_sync.app_name}"
