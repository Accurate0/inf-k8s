# yaml-language-server: $schema=../rule.schema.json
name: mirror-commit-status
when:
  all:
    - any:
        - type: event
          kind: commit_status
          source: github
        - type: event
          kind: check_run
          source: github
    - type: repository
      value: Accurate0/inf-k8s
    - not:
        type: title_matches
        value: renovate
actions:
  - run:
      - type: set_commit_status
        target:
          owner: anurag
          repo: k8s
        sha: "{sha}"
        state: "{state}"
        context: "{context}"
        description: "{description}"
        target_url: "{target_url}"
