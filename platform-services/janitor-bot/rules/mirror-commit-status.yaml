# yaml-language-server: $schema=./rule.schema.json
name: mirror-commit-status
when:
  all:
    - any:
        - type: event
          kind: commit_status
          source: github
        - type: event
          kind: check_run
          source: github
    - not:
        type: title_matches
        value: renovate
actions:
  - run:
      - type: set_commit_status
        target:
          owner: "{mirror.owner}"
          repo: "{mirror.repo}"
        sha: "{sha}"
        state: "{state}"
        context: "{context}"
        description: "{description}"
        target_url: "{target_url}"
