# yaml-language-server: $schema=../rule.schema.json
name: argocd-sync-merged-pr
when:
  all:
    - type: event
      kind: pr
      source: forgejo
    - type: action
      value: closed
    - type: is_merged
    - type: repository
      value: anurag/k8s
    - type: target_branch
      value: main
actions:
  - run:
      - type: wait_for_github_sync
        target:
          owner: Accurate0
          repo: inf-k8s
        sha: "{forgejo_pr.merge_commit_sha}"
        timeout_secs: 120
      - type: argocd_sync_changed_apps
