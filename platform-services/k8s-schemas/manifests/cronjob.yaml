# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/batch/cronjob_v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: k8s-schemas
  namespace: k8s-schemas
spec:
  schedule: "0 0 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: k8s-schemas
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: tmp
              emptyDir: {}
          containers:
            - name: k8s-schemas
              image: ghcr.io/accurate0/k8s-schemas
              imagePullPolicy: Always
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              env:
                - name: K8S_VERSION
                  value: v1.35.2
              envFrom:
                - secretRef:
                    name: k8s-schemas-managed-secrets
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 512Mi
