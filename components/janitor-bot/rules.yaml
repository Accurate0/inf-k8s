rules:
  - name: label-renovate
    matches:
      all:
        - type: forgejo
        - type: pr_event
        - type: target_branch
          value: main
        - type: action
          value: opened
        - type: author
          value: renovate
        - not:
            type: has_label
            value: renovate
        - type: is_open
        - type: not_approved_by_self
    actions:
      - type: ensure_labels_exist
        labels:
          - name: renovate
            color: "#1a7f37"
      - type: add_labels_by_name
        labels: [renovate]

  - name: auto-merge-ci-image-updater
    matches:
      all:
        - type: forgejo
        - type: pr_event
        - type: target_branch
          value: main
        - type: action
          value: opened
        - type: author
          value: ci-image-updater
        - type: is_open
        - type: not_approved_by_self
    actions:
      - type: ensure_labels_exist
        labels:
          - name: image-update
            color: "#0075ca"
          - name: automated
            color: "#e4e669"
      - type: add_labels_by_name
        labels: [image-update, automated]
      - type: approve
        body: "Auto-approved: PR from ci-image-updater"
      - type: merge
        strategy: squash
        delete_branch: true

  - name: auto-merge-renovate
    matches:
      all:
        - type: forgejo
        - type: pr_event
        - type: target_branch
          value: main
        - type: action
          value: opened
        - type: author
          value: renovate
        - type: has_changed_files
        - type: changed_files_all_match
          patterns:
            - starts_with: ".github/workflows/"
            - contains: Dockerfile
        - type: changed_files_none_match
          patterns:
            - contains: "applications/postgres-cluster/container/Dockerfile"
        - type: is_open
        - type: not_approved_by_self
    actions:
      - type: ensure_labels_exist
        labels:
          - name: automated
            color: "#e4e669"
      - type: add_labels_by_name
        labels: [automated]
      - type: approve
        body: "Auto-approved: Renovate PR targeting workflows/Dockerfiles"
      - type: merge
        strategy: squash
        delete_branch: true

  - name: github-workflow-failure
    matches:
      all:
        - type: github
        - type: workflow_event
        - type: target_branch
          value: main
        - type: workflow_conclusion
          value: failure
    actions:
      - type: create_issue
        target:
          owner: anurag
          repo: k8s
        dedup_key: "[GitHub CI] {workflow_name}"
        title: "[GitHub CI] {workflow_name}"
        body: |
          | Detail | Value |
          |--------|-------|
          | Workflow | **{workflow_name}** |
          | Result | `failure` |
          | Run | {run_url} |
        comment_body: |
          | Detail | Value |
          |--------|-------|
          | Result | `failure` |
          | Run | {run_url} |

  - name: github-workflow-resolved
    matches:
      all:
        - type: github
        - type: workflow_event
        - type: target_branch
          value: main
        - type: workflow_conclusion
          value: success
    actions:
      - type: close_issue
        target:
          owner: anurag
          repo: k8s
        dedup_key: "[GitHub CI] {workflow_name}"
        comment_body: |
          | Detail | Value |
          |--------|-------|
          | Result | `success` |
          | Run | {run_url} |
