# yaml-language-server: $schema=../rule.schema.json
name: queue-renovate
enabled: true
matches:
  all:
    - type: forgejo
    - type: pr_event
    - type: target_branch
      value: main
    - type: action
      value: opened
    - type: author
      value: renovate
    - type: has_changed_files
    - type: changed_files_all_match
      patterns:
        - starts_with: ".github/workflows/"
        - contains: Dockerfile
    - type: changed_files_none_match
      patterns:
        - contains: "applications/postgres-cluster/container/Dockerfile"
    - not:
        type: has_label
        value: update-major
    - type: is_open
    - not:
        type: time_window
        timezone: Australia/Perth
        start: 17
        end: 22
    - not:
        type: has_label
        value: janitor/queued
actions:
  - type: ensure_labels_exist
    labels:
      - name: janitor/queued
        color: "#fbca04"
  - type: add_labels_by_name
    labels: [janitor/queued]
