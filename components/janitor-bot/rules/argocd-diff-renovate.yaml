# yaml-language-server: $schema=../rule.schema.json
name: argocd-diff-renovate
enabled: true
priority: 10
matches:
  all:
    - type: forgejo
    - type: pr_event
    - type: author
      value: renovate
    - type: target_branch
      value: main
    - type: is_open
    - type: has_changed_files
    - type: changed_files_any_match
      patterns:
        - "applications/*.application.yaml"
actions:
  - type: argocd_diff
