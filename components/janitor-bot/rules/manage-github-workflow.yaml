# yaml-language-server: $schema=../rule.schema.json
name: manage-github-workflow
enabled: true
matches:
  all:
    - type: github
    - type: workflow_event
    - type: repository
      value: Accurate0/inf-k8s
    - type: target_branch
      value: main
variables:
  - var: is_failure
    type: workflow_conclusion
    value: failure
  - var: is_success
    type: workflow_conclusion
    value: success
actions:
  - when: "is_failure"
    run:
      - type: ensure_labels_exist
        target:
          owner: anurag
          repo: k8s
        labels:
          - name: github-ci-failure
            color: "#d73a4a"
          - name: automated
            color: "#e4e669"
      - type: create_issue
        target:
          owner: anurag
          repo: k8s
        deduplicateByTitle: true
        title:
          content: "[GitHub CI] {repository} {github_workflow.workflow_name} failed"
          template: true
        labels:
          - name: github-ci-failure
            color: "#d73a4a"
          - name: automated
            color: "#e4e669"
        body:
          template: true
          content: |
            ## Workflow Failed

            | Detail | Value |
            |--------|-------|
            | Workflow | **{github_workflow.workflow_name}** |
            | Result | `failure` |
            | Branch | `{github_workflow.branch}` |
            | Run | [#{github_workflow.run_number} (attempt {github_workflow.run_attempt})]({github_workflow.run_url}) |
            | Commit | [`{short_sha}`](https://github.com/{repository}/commit/{github_workflow.head_sha}) — {github_workflow.commit_message} |
            | Author | {github_workflow.commit_author} |

            ### Logs

            ```
            {github_workflow.failed_jobs_logs}
            ```

            <!-- {github_workflow.metadata_json} -->
        on_duplicate_comment:
          template: true
          content: |
            ## Re-run Failed

            | Detail | Value |
            |--------|-------|
            | Result | `failure` |
            | Run | [#{github_workflow.run_number} (attempt {github_workflow.run_attempt})]({github_workflow.run_url}) |
            | Commit | [`{short_sha}`](https://github.com/{repository}/commit/{github_workflow.head_sha}) — {github_workflow.commit_message} |

            ```
            {github_workflow.failed_jobs_logs}
            ```

            <!-- {github_workflow.metadata_json} -->
  - when: "is_success"
    run:
      - type: close_issue
        target:
          owner: anurag
          repo: k8s
        title:
          content: "[GitHub CI] {repository} {github_workflow.workflow_name} failed"
          template: true
        closing_comment:
          template: true
          content: |
            ## Resolved

            | Detail | Value |
            |--------|-------|
            | Result | `success` |
            | Run | [#{github_workflow.run_number} (attempt {github_workflow.run_attempt})]({github_workflow.run_url}) |
            | Commit | [`{short_sha}`](https://github.com/{repository}/commit/{github_workflow.head_sha}) — {github_workflow.commit_message} |
