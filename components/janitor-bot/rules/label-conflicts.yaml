# yaml-language-server: $schema=../rule.schema.json
name: label-conflicts
enabled: true
matches:
  all:
    - type: forgejo
    - type: pr_event
    - type: is_open
    - type: has_conflicts
    - not:
        type: has_label
        value: conflicts
actions:
  - type: ensure_labels_exist
    labels:
      - name: conflicts
        color: "#d73a4a"
  - type: add_labels_by_name
    labels: [conflicts]
