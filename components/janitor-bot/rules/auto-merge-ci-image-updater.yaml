# yaml-language-server: $schema=../rule.schema.json
name: auto-merge-ci-image-updater
enabled: true
matches:
  all:
    - type: forgejo
    - type: pr_event
    - type: target_branch
      value: main
    - type: author
      value: ci-image-updater
    - type: is_open
    - type: not_approved_by_self
    - type: time_window
      timezone: Australia/Perth
      start: 17
      end: 22
actions:
  - type: ensure_labels_exist
    labels:
      - name: image-update
        color: "#0075ca"
      - name: automated
        color: "#e4e669"
  - type: remove_labels_by_name
    labels: [janitor/queued]
  - type: add_labels_by_name
    labels: [image-update, automated]
  - type: approve
    comment: "Auto-approved: PR from ci-image-updater"
  - type: merge
    strategy: squash
    delete_branch: true
