      request_duration_millis: 0.1
      timestamp: "2026-01-07T10:00:00Z"
  - service: forgejo
    method: GET
    path: /api/v1/repos/anurag/k8s/pulls/102/files
    status: 200
    body:
      - filename: src/main.rs
        contents_url: ""
        html_url: ""
        raw_url: ""
