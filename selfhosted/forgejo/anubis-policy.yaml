bots:
  - name: well-known
    path_regex: ^/\.well-known/.*$
    action: ALLOW
  - name: favicon
    path_regex: ^/favicon\.ico$
    action: ALLOW
  - name: robots-txt
    path_regex: ^/robots\.txt$
    action: ALLOW
  - name: forgejo-api
    path_regex: ^/api/.*$
    action: ALLOW
  - name: git-protocol
    path_regex: \.git/(info/refs|git-upload-pack|git-receive-pack)$
    action: ALLOW
  - name: catchall
    user_agent_regex: .*
    action: CHALLENGE
