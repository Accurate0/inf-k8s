---
name: Terraform plan
"on":
  workflow_dispatch:
  pull_request:
    paths:
      - "terraform/**"
      - ".forgejo/workflows/terraform-plan.yaml"

concurrency:
  group: terraform-plan
  cancel-in-progress: false

jobs:
  plan:
    name: tofu plan
    runs-on: docker
    defaults:
      run:
        working-directory: terraform
    env:
      BINARYLANE_API_TOKEN: ${{ secrets.BINARYLANE_API_TOKEN }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_VAR_infisical_client_id: ${{ secrets.TF_VAR_INFISICAL_CLIENT_ID }}
      TF_VAR_infisical_client_secret: ${{ secrets.TF_VAR_INFISICAL_CLIENT_SECRET }}
      TF_VAR_tf_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install OpenTofu
        env:
          OPENTOFU_VERSION: "1.11.6"
        run: |
          curl -sfL https://get.opentofu.org/install-opentofu.sh \
            -o install-opentofu.sh
          chmod +x install-opentofu.sh
          ./install-opentofu.sh --install-method standalone \
            --opentofu-version "$OPENTOFU_VERSION" \
            --install-path /usr/local/bin --symlink-path -
          rm install-opentofu.sh

      - name: tofu init
        run: tofu init -input=false

      - name: tofu plan
        id: plan
        run: |
          set +e
          tofu plan -input=false -no-color -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        env:
          FORGEJO_TOKEN: ${{ secrets.JANITOR_TOKEN }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PLAN_FILE: ${{ github.workspace }}/terraform/plan.txt
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.exitcode }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: .forgejo/scripts/post-tf-plan-comment.sh

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1
