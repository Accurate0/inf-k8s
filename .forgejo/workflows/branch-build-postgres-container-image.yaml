name: Branch build postgres container image
on:
  pull_request:
    paths:
      - system-components/postgres-cluster/container/Dockerfile
      - .forgejo/workflows/branch-build-postgres-container-image.yaml
  push:
    branches-ignore:
      - main
    paths:
      - system-components/postgres-cluster/container/Dockerfile
      - .forgejo/workflows/branch-build-postgres-container-image.yaml

jobs:
  build:
    name: Build
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: system-components/postgres-cluster/container
          push: false
