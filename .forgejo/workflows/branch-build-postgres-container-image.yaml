name: Branch build postgres container image
on:
  workflow_dispatch:
  pull_request:
    paths:
      - system-components/postgres-cluster/container/Dockerfile
      - .forgejo/workflows/branch-build-postgres-container-image.yaml
  push:
    branches-ignore:
      - main
    paths:
      - system-components/postgres-cluster/container/Dockerfile
      - .forgejo/workflows/branch-build-postgres-container-image.yaml

jobs:
  build:
    name: Build
    runs-on: docker
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: system-components/postgres-cluster/container
          push: false
