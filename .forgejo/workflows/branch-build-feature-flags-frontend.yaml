name: Branch build feature-flags-frontend
on:
  workflow_dispatch:
  pull_request:
    paths:
      - platform-services/feature-flags/web/**
      - .forgejo/workflows/branch-build-feature-flags-frontend.yaml

jobs:
  build:
    name: Build
    runs-on: docker
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./platform-services/feature-flags/web
          file: ./platform-services/feature-flags/web/Dockerfile
          push: false

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.34.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform-services/feature-flags/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: platform-services/feature-flags/web
      - run: pnpm --filter @accurate0/feature-flag-client build
        working-directory: platform-services/feature-flags/web
      - run: pnpm --filter feature-flags-frontend check
        working-directory: platform-services/feature-flags/web
