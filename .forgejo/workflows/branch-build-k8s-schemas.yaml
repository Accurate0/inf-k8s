name: Branch build k8s-schemas
on:
  pull_request:
    paths:
      - platform-services/k8s-schemas/**
      - .forgejo/workflows/branch-build-k8s-schemas.yaml
  push:
    branches-ignore:
      - main
    paths:
      - platform-services/k8s-schemas/**
      - .forgejo/workflows/branch-build-k8s-schemas.yaml

jobs:
  build:
    name: Build
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: platform-services/k8s-schemas
          push: false
