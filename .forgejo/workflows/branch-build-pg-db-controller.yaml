name: Branch build pg-db-controller
on:
  workflow_dispatch:
  pull_request:
    paths:
      - platform-services/pg-db-controller/**
      - .forgejo/workflows/branch-build-pg-db-controller.yaml
  push:
    branches-ignore:
      - main
    paths:
      - platform-services/pg-db-controller/**
      - .forgejo/workflows/branch-build-pg-db-controller.yaml

jobs:
  build:
    name: Build
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./platform-services/pg-db-controller
          push: false
          build-args: |
            BINARY_NAME=pg-db-controller
