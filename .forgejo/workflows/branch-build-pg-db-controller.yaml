name: Branch build pg-db-controller
on:
  workflow_dispatch:
  pull_request:
    paths:
      - platform-services/pg-db-controller/**
      - .forgejo/workflows/branch-build-pg-db-controller.yaml

jobs:
  build:
    name: Build
    runs-on: docker
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./platform-services/pg-db-controller
          push: false
          build-args: |
            BINARY_NAME=pg-db-controller
