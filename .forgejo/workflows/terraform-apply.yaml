---
name: Terraform apply
"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".forgejo/workflows/terraform-apply.yaml"

concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply:
    name: tofu apply
    runs-on: ubuntu-latest
    env:
      BINARYLANE_API_TOKEN: ${{ secrets.BINARYLANE_API_TOKEN }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_VAR_infisical_client_id: ${{ secrets.TF_VAR_INFISICAL_CLIENT_ID }}
      TF_VAR_infisical_client_secret: ${{ secrets.TF_VAR_INFISICAL_CLIENT_SECRET }}
      TF_VAR_tf_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install OpenTofu
        env:
          OPENTOFU_VERSION: "1.11.6"
        run: |
          curl -sfL https://get.opentofu.org/install-opentofu.sh \
            -o install-opentofu.sh
          chmod +x install-opentofu.sh
          ./install-opentofu.sh --install-method standalone \
            --opentofu-version "$OPENTOFU_VERSION" \
            --install-path /usr/local/bin --symlink-path -
          rm install-opentofu.sh

      - name: tofu init
        run: tofu -chdir=terraform init -input=false

      - name: tofu apply
        run: tofu -chdir=terraform apply -input=false -no-color -auto-approve
