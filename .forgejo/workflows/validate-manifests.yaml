name: Validate manifests
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**.application.yaml"
      - "**/manifests/**"
      - "**/kustomization.yaml"
      - scripts/validate-manifests.sh
      - .forgejo/workflows/validate-manifests.yaml

env:
  KUBECONFORM_VERSION: v0.7.0
  KUSTOMIZE_VERSION: v5.7.1

jobs:
  validate:
    name: kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install kubeconform
        run: |
          curl -sfL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform

      - name: Install kustomize
        run: |
          curl -sfL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kustomize

      - name: Validate manifests
        run: scripts/validate-manifests.sh
