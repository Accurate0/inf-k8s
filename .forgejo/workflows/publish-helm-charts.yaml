name: Publish helm charts
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - charts/**
      - .forgejo/workflows/publish-helm-charts.yaml

jobs:
  release:
    name: Release
    runs-on: docker
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.18.3

      - name: Install helm cm-push plugin
        run: helm plugin install https://github.com/chartmuseum/helm-push

      - name: Package and Publish
        env:
          FORGEJO_TOKEN: ${{ secrets.PACKAGES_WRITE }}
          OWNER: anurag
          FORGEJO_HELM_URL: https://git.anurag.sh/api/packages/anurag/helm
        run: |
          helm package charts/k8s-http-routes
          helm package charts/k8s-infisical-secrets
          helm package charts/k8s-secrets
          for pkg in ./*.tgz; do
            helm cm-push --username "${OWNER}" --password "${FORGEJO_TOKEN}" "${pkg}" "${FORGEJO_HELM_URL}"
          done
