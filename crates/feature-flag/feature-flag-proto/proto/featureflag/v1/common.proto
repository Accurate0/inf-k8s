syntax = "proto3";

package featureflag.v1;

import "google/protobuf/struct.proto";

// The typed kind of a flag's variant values. A flag's variants all share its type.
enum ValueType {
  VALUE_TYPE_UNSPECIFIED = 0;
  VALUE_TYPE_BOOLEAN = 1;
  VALUE_TYPE_STRING = 2;
  VALUE_TYPE_INTEGER = 3;
  VALUE_TYPE_FLOAT = 4;
  VALUE_TYPE_OBJECT = 5;
}

// Why a particular value was returned, mapped to OpenFeature reasons by the provider.
enum Reason {
  REASON_UNSPECIFIED = 0;
  REASON_STATIC = 1;
  REASON_DEFAULT = 2;
  REASON_TARGETING_MATCH = 3;
  REASON_SPLIT = 4;
  REASON_DISABLED = 5;
  REASON_ERROR = 6;
}

// Operators a segment constraint can apply to a context attribute.
enum ConstraintOperator {
  CONSTRAINT_OPERATOR_UNSPECIFIED = 0;
  CONSTRAINT_OPERATOR_EQ = 1;
  CONSTRAINT_OPERATOR_NEQ = 2;
  CONSTRAINT_OPERATOR_IN = 3;
  CONSTRAINT_OPERATOR_NOT_IN = 4;
  CONSTRAINT_OPERATOR_CONTAINS = 5;
  CONSTRAINT_OPERATOR_STARTS_WITH = 6;
  CONSTRAINT_OPERATOR_ENDS_WITH = 7;
  CONSTRAINT_OPERATOR_GT = 8;
  CONSTRAINT_OPERATOR_GTE = 9;
  CONSTRAINT_OPERATOR_LT = 10;
  CONSTRAINT_OPERATOR_LTE = 11;
  CONSTRAINT_OPERATOR_EXISTS = 12;
  CONSTRAINT_OPERATOR_REGEX = 13;
  // Matches when the flag named by the constraint's attribute resolves to one of
  // the variant keys in values. Lets a rule depend on another flag's resolution.
  CONSTRAINT_OPERATOR_FLAG_MATCHES = 14;
}

// The OpenFeature-style evaluation context the engine matches rules against.
message EvaluationContext {
  // The key used for stable percentage-rollout bucketing.
  string targeting_key = 1;
  // Arbitrary attributes (string/number/bool) referenced by segment constraints.
  google.protobuf.Struct attributes = 2;
}

message Variant {
  string key = 1;
  // The variant payload. Scalar types use the matching google.protobuf.Value kind;
  // object flags carry a struct.
  google.protobuf.Value value = 2;
}

message Constraint {
  string attribute = 1;
  ConstraintOperator operator = 2;
  // Comparison operands; most operators use a single value, IN/NOT_IN use the list.
  repeated google.protobuf.Value values = 3;
}

message Segment {
  string key = 1;
  string name = 2;
  // A context matches the segment only when every constraint matches (AND).
  repeated Constraint constraints = 3;
}

// A group of constraints OR-combined together. Used by a rule's inline targeting:
// the group matches when ANY of its constraints match. An empty group matches.
message ConstraintGroup {
  repeated Constraint constraints = 1;
}

// One weighted variant within a rule's percentage split.
message Distribution {
  string variant_key = 1;
  // Integer percentage [0,100]; weights within a rule must sum to 100.
  uint32 weight = 2;
}

// An ordered targeting rule on a flag. A rule matches when its segment (if any)
// matches AND all of its inline constraints match; it then serves either a single
// variant or a weighted split of variants.
message Rule {
  uint32 rank = 1;
  string segment_key = 2;
  string variant_key = 3;
  repeated Distribution distributions = 4;
  // Inline constraint groups matched directly against context attributes (CNF):
  // the groups are AND-combined with each other and with segment_key, while the
  // constraints within a group are OR-combined. Lets a rule target attributes
  // without a named segment.
  repeated ConstraintGroup constraint_groups = 5;
  // Optional salt mixed into percentage-rollout bucketing. Two rules with different
  // salts bucket the same targeting key independently; empty preserves the legacy
  // per-flag bucketing shared across the flag's rules.
  string bucket_salt = 6;
}

message Flag {
  string key = 1;
  ValueType value_type = 2;
  bool enabled = 3;
  string default_variant_key = 4;
  bool archived = 5;
  repeated Variant variants = 6;
  repeated Rule rules = 7;
  reserved 8;
  reserved "prerequisites";
}
