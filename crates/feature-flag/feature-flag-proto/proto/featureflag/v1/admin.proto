syntax = "proto3";

package featureflag.v1;

import "featureflag/v1/common.proto";

// Write path: manage flags, variants, segments, and targeting rules. Every
// mutation bumps the global config version and notifies streaming evaluators.
service Admin {
  rpc CreateFlag(CreateFlagRequest) returns (Flag);
  rpc GetFlag(GetFlagRequest) returns (Flag);
  rpc ListFlags(ListFlagsRequest) returns (ListFlagsResponse);
  rpc UpdateFlag(UpdateFlagRequest) returns (Flag);
  rpc ArchiveFlag(ArchiveFlagRequest) returns (Flag);
  rpc DeleteFlag(DeleteFlagRequest) returns (DeleteFlagResponse);

  rpc UpsertVariant(UpsertVariantRequest) returns (Flag);
  rpc DeleteVariant(DeleteVariantRequest) returns (Flag);

  rpc CreateSegment(CreateSegmentRequest) returns (Segment);
  rpc GetSegment(GetSegmentRequest) returns (Segment);
  rpc ListSegments(ListSegmentsRequest) returns (ListSegmentsResponse);
  rpc UpdateSegment(UpdateSegmentRequest) returns (Segment);
  rpc DeleteSegment(DeleteSegmentRequest) returns (DeleteSegmentResponse);

  // Replaces the full ordered rule set for a flag; ranks are assigned by position.
  rpc SetFlagRules(SetFlagRulesRequest) returns (Flag);

  // Replaces the full set of prerequisites for a flag.
  rpc SetFlagPrerequisites(SetFlagPrerequisitesRequest) returns (Flag);

  // Read the audit log of admin mutations, newest first.
  rpc ListChanges(ListChangesRequest) returns (ListChangesResponse);
}

message CreateFlagRequest {
  string key = 1;
  ValueType value_type = 2;
  bool enabled = 3;
  string default_variant_key = 4;
  repeated Variant variants = 5;
}

message GetFlagRequest {
  string key = 1;
}

message ListFlagsRequest {
  bool include_archived = 1;
}

message ListFlagsResponse {
  repeated Flag flags = 1;
}

message UpdateFlagRequest {
  string key = 1;
  bool enabled = 2;
  string default_variant_key = 3;
}

message ArchiveFlagRequest {
  string key = 1;
  bool archived = 2;
}

message DeleteFlagRequest {
  string key = 1;
}

message DeleteFlagResponse {}

message UpsertVariantRequest {
  string flag_key = 1;
  Variant variant = 2;
}

message DeleteVariantRequest {
  string flag_key = 1;
  string variant_key = 2;
}

message CreateSegmentRequest {
  Segment segment = 1;
}

message GetSegmentRequest {
  string key = 1;
}

message ListSegmentsRequest {}

message ListSegmentsResponse {
  repeated Segment segments = 1;
}

message UpdateSegmentRequest {
  Segment segment = 1;
}

message DeleteSegmentRequest {
  string key = 1;
}

message DeleteSegmentResponse {}

message SetFlagRulesRequest {
  string flag_key = 1;
  repeated Rule rules = 2;
}

message SetFlagPrerequisitesRequest {
  string flag_key = 1;
  repeated Prerequisite prerequisites = 2;
}

// One audit-log entry: a single admin mutation, stamped with the config version it
// produced and the identity of the actor that made it.
message FlagChange {
  string id = 1;
  int64 version = 2;
  string actor = 3;
  // The mutating operation, e.g. `create_flag`, `set_flag_rules`, `delete_segment`.
  string action = 4;
  // What was changed: `flag` or `segment`, plus its key.
  string target_kind = 5;
  string target_key = 6;
  // Operation-specific payload, serialised as a JSON object string.
  string detail = 7;
  // RFC 3339 timestamp of when the change was recorded.
  string created_at = 8;
}

message ListChangesRequest {
  // Optional filters; an empty string matches any kind/key.
  string target_kind = 1;
  string target_key = 2;
  // Maximum rows to return; clamped server-side. 0 applies the default limit.
  uint32 limit = 3;
}

message ListChangesResponse {
  repeated FlagChange changes = 1;
}
