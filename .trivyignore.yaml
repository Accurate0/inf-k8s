misconfigurations:
  # pg-db-controller intentionally manages secrets cluster-wide.
  - id: AVD-KSV-0041
    paths:
      - "platform-services/pg-db-controller/**"
      - "platform-services/kanidm-sync/manifests/**"

  # HEALTHCHECK is enforced via Kubernetes liveness/readiness probes, not Dockerfile.
  - id: AVD-DS-0026

  # Image tags/digests are pinned in kustomization.yaml (overlay), not the base manifest.
  - id: AVD-KSV-0013

  # CPU/memory limits intentionally unset (requests-only sizing).
  - id: AVD-KSV-0011
  - id: AVD-KSV-0018

  # ALLOW_EMAIL_PASSWORD_LOGIN/REGISTRATION are boolean feature flags, not secrets.
  - id: AVD-KSV-0109
    paths:
      - "selfhosted/dawarich/configmap.yaml"
  - id: AVD-KSV-01010
    paths:
      - "selfhosted/dawarich/configmap.yaml"

  # home-gateway + solar-web run with default security context (reverted hardening).
  - id: AVD-KSV-0001
