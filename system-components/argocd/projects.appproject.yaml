# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/appproject_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: projects
  namespace: argocd
spec:
  description: User projects
  sourceRepos:
    - https://github.com/Accurate0/inf-k8s.git
    - https://git.anurag.sh/anurag/k8s.git
    - oci://ghcr.io/accurate0/charts/k8s-http-routes
    - oci://ghcr.io/accurate0/charts/k8s-infisical-secrets
    - oci://ghcr.io/accurate0/charts/k8s-secrets
  destinations:
    - namespace: "*"
      server: "*"
  orphanedResources:
    warn: false
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
