# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/appproject_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: bootstrap
  namespace: argocd
  annotations:
    # Ensure the project exists before the app-of-apps roots that reference it.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: App-of-apps roots that bootstrap all other Applications
  sourceRepos:
    - https://github.com/Accurate0/inf-k8s.git
    - https://git.anurag.sh/anurag/k8s.git
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
  orphanedResources:
    warn: false
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: argoproj.io
      kind: Application
