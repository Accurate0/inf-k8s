# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/appproject_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: selfhosted
  namespace: argocd
spec:
  description: Self-hosted applications
  sourceRepos:
    - https://github.com/Accurate0/inf-k8s.git
    - https://git.anurag.sh/anurag/k8s.git
    - oci://code.forgejo.org/forgejo-helm/forgejo
    - oci://ghcr.io/accurate0/charts/k8s-secrets
    - oci://ghcr.io/bjw-s-labs/helm/app-template
  destinations:
    - namespace: "*"
      server: "*"
  orphanedResources:
    warn: false
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
