# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/appproject_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: system-components
  namespace: argocd
spec:
  description: System components
  sourceRepos:
    - https://github.com/Accurate0/inf-k8s.git
    - https://git.anurag.sh/anurag/k8s.git
    - https://git.deuxfleurs.fr/Deuxfleurs/garage.git
    - https://argoproj.github.io/argo-helm
    - https://charts.goauthentik.io
    - https://charts.jetstack.io
    - https://charts.longhorn.io/
    - https://cloudnative-pg.github.io/charts
    - https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts
    - https://grafana-community.github.io/helm-charts
    - https://helm.flipt.io
    - https://kubernetes-sigs.github.io/descheduler/
    - https://mend.github.io/renovate-ce-ee
    - https://prometheus-community.github.io/helm-charts
    - docker.io/envoyproxy
    - oci://code.forgejo.org/forgejo-helm/forgejo
    - oci://ghcr.io/accurate0/charts/k8s-http-routes
    - oci://ghcr.io/bjw-s-labs/helm-charts/app-template
    - oci://ghcr.io/accurate0/charts/k8s-infisical-secrets
    - oci://ghcr.io/dragonflydb/dragonfly-operator/helm/dragonfly-operator
  destinations:
    - namespace: "*"
      server: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
