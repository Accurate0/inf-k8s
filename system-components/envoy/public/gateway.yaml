# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/gateway.networking.k8s.io/gateway_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-gateway
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/target: external.inf-k8s.net
spec:
  gatewayClassName: envoy-gateway
  # NOTE: ports must be unique across the internal-gateway too — mergeGateways
  # (see config.yaml) collapses both Gateways into one Envoy. internal uses 2222.
  listeners:
    - name: git-ssh
      protocol: TCP
      port: 2223
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: forgejo
        kinds:
          - group: gateway.networking.k8s.io
            kind: TCPRoute
    - name: anurag-id-au-https
      protocol: HTTPS
      hostname: anurag.id.au
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway.inf-k8s.net/anurag-id-au: "true"
      port: 8443
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: anurag-id-au-tls
    - name: wildcard-anurag-sh-https
      protocol: HTTPS
      hostname: "*.anurag.sh"
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway.inf-k8s.net/anurag-sh: "true"
      port: 8443
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: wildcard-anurag-sh-tls
    # Dedicated listener so the escaped-slash ClientTrafficPolicy (KeepUnchanged)
    # is scoped to Forgejo only — Renovate needs %2F preserved in branch refs.
    - name: git-anurag-sh-https
      protocol: HTTPS
      hostname: git.anurag.sh
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              kubernetes.io/metadata.name: forgejo
      port: 8443
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: wildcard-anurag-sh-tls
    - name: anurag-sh-https
      protocol: HTTPS
      hostname: anurag.sh
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway.inf-k8s.net/anurag-sh: "true"
      port: 8443
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: anurag-sh-tls
    - name: wildcard-maccas-one-https
      protocol: HTTPS
      hostname: "*.maccas.one"
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway.inf-k8s.net/maccas-one: "true"
      port: 8443
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: wildcard-maccas-one-tls
    - name: maccas-one-https
      protocol: HTTPS
      hostname: maccas.one
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway.inf-k8s.net/maccas-one: "true"
      port: 8443
      tls:
        certificateRefs:
          - group: ""
            kind: Secret
            name: maccas-one-tls
