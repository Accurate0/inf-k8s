# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: argocd
spec:
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: TCPRoute
      name: forgejo-ssh
      jqPathExpressions:
        - ".status"
        - ".spec.parentRefs"
        - ".spec.rules[].backendRefs[].group"
        - ".spec.rules[].backendRefs[].weight"
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        inf-k8s.net/infisical-secrets: "true"
        gateway.inf-k8s.net/anurag-sh: "true"
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: system-components
  sources:
    - chart: k8s-secrets
      repoURL: oci://ghcr.io/accurate0/charts/k8s-secrets
      targetRevision: 0.3.0
      helm:
        valuesObject:
          defaults:
            namespace: forgejo
            projectSlug: forgejo-lmh-v
            resyncInterval: 900
          secrets:
            - name: forgejo-ssh-signing-secrets
              secretPath: /ssh-signing
              managedSecrets:
                - secretName: forgejo-ssh-signing-managed-secrets
                  template:
                    includeAllSecrets: false
                    data:
                      ed25519: "{{ .SSH_SIGNING_KEY }}"
                      ed25519.pub: "{{ .SSH_SIGNING_KEY_PUBLIC }}"
            - name: forgejo-ssh-host-secrets
              secretPath: /ssh
              managedSecrets:
                - secretName: forgejo-ssh-host-managed-secrets
                  template:
                    includeAllSecrets: false
                    data:
                      ssh_host_ed25519_key: "{{ .SSH_HOST_KEY }}"
            - name: forgejo-gpg-secrets
              secretPath: /gpg
              managedSecrets:
                - secretName: forgejo-gpg-managed-secrets
                  template:
                    includeAllSecrets: false
                    data:
                      privateKey: "{{ .GPG_PRIVATE_KEY }}"
            - name: forgejo-oauth-secrets
              secretPath: /oauth
              managedSecrets:
                - secretName: forgejo-oauth-managed-secrets
                  template:
                    includeAllSecrets: false
                    data:
                      key: "{{ .AUTHENTIK_CLIENT_ID }}"
                      secret: "{{ .AUTHENTIK_CLIENT_SECRET }}"
            - name: forgejo-secrets
              secretPath: /
              managedSecrets:
                - secretName: forgejo-managed-secrets
            - name: forgejo-runner-secrets
              secretPath: /runner
              managedSecrets:
                - secretName: forgejo-runner-secret
                  template:
                    includeAllSecrets: false
                    data:
                      uuid: "{{ .UUID }}"
                      token: "{{ .TOKEN }}"
            - name: forgejo-anubis-secrets
              secretPath: /anubis
              managedSecrets:
                - secretName: forgejo-anubis-managed-secrets
                  template:
                    includeAllSecrets: false
                    data:
                      ED25519_PRIVATE_KEY_HEX: "{{ .ED25519_PRIVATE_KEY_HEX }}"
    - chart: forgejo
      repoURL: oci://code.forgejo.org/forgejo-helm/forgejo
      targetRevision: 17.1.0
      helm:
        valuesObject:
          extraVolumes:
            - name: forgejo-themes
              configMap:
                name: forgejo-themes
            - name: forgejo-ssh-host
              secret:
                secretName: forgejo-ssh-host-managed-secrets
            - name: forgejo-ssh-signing
              secret:
                secretName: forgejo-ssh-signing-managed-secrets
                defaultMode: 0o444
            - name: anubis-policy
              configMap:
                name: forgejo-anubis-policy

          extraContainers:
            - name: anubis
              image: ghcr.io/techarohq/anubis:v1.25.0@sha256:5cf4c0d6c7ea01a356c6685a779971bdd28d6a5a4a6719201f73a9c4ae108db0
              imagePullPolicy: IfNotPresent
              ports:
                - name: anubis-http
                  containerPort: 8923
                - name: anubis-metrics
                  containerPort: 9090
              env:
                - name: BIND
                  value: ":8923"
                - name: METRICS_BIND
                  value: ":9090"
                - name: TARGET
                  value: "http://localhost:3000"
                - name: DIFFICULTY
                  value: "4"
                - name: SERVE_ROBOTS_TXT
                  value: "true"
                - name: OG_PASSTHROUGH
                  value: "true"
                - name: OG_EXPIRY_TIME
                  value: "24h"
                - name: POLICY_FNAME
                  value: /data/cfg/botPolicies.yaml
                - name: ED25519_PRIVATE_KEY_HEX
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-anubis-managed-secrets
                      key: ED25519_PRIVATE_KEY_HEX
              volumeMounts:
                - name: anubis-policy
                  mountPath: /data/cfg/botPolicies.yaml
                  subPath: botPolicies.yaml
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  memory: 256Mi
              securityContext:
                runAsUser: 1000
                runAsGroup: 1000
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault

          extraContainerVolumeMounts:
            - name: forgejo-themes
              readOnly: true
              mountPath: "/data/gitea/public/assets/css"
            - name: forgejo-ssh-host
              mountPath: "/data/gitea/ssh/ssh_host_ed25519_key"
              subPath: ssh_host_ed25519_key
            - name: forgejo-ssh-signing
              mountPath: /data/signing
              readOnly: true

          extraInitVolumeMounts:
            - name: forgejo-ssh-signing
              mountPath: /data/signing
              readOnly: true

          image:
            rootless: true

          replicaCount: 1
          topologySpreadConstraints:
            - topologyKey: inf-k8s.net/location
              whenUnsatisfiable: ScheduleAnyway
              maxSkew: 1
              nodeTaintsPolicy: Honor
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: forgejo

          # HTTPRoute is owned by the kustomize source so it can target the
          # anubis sidecar service instead of forgejo-http directly.
          httpRoute:
            enabled: false
          tcpRoute:
            enabled: true
            parentRefs:
              - name: public-gateway
                namespace: envoy-gateway-system
                sectionName: git-ssh
          persistence:
            enabled: true
            size: 100Gi
            storageClass: longhorn-replicated
            accessModes:
              - ReadWriteOnce
            labels:
              recurring-job-group.longhorn.io/daily-backup: enabled
          signing:
            enabled: false
          gitea:
            readinessProbe:
              enabled: true
              httpGet:
                path: /api/healthz
                port: http
              initialDelaySeconds: 5
              timeoutSeconds: 1
              periodSeconds: 120
              successThreshold: 1
              failureThreshold: 3
            livenessProbe:
              enabled: true
              tcpSocket:
                port: http
              initialDelaySeconds: 200
              timeoutSeconds: 1
              periodSeconds: 120
              successThreshold: 1
              failureThreshold: 10
            admin:
              username: ""
              existingSecret: ""
            config:
              APP_NAME: "git"
              APP_SLOGAN: ""
              ui:
                THEMES: forgejo-auto,forgejo-light,forgejo-dark,anthracite,anthracite-dark,anthracite-light
                DEFAULT_THEME: anthracite
              admin:
                EXTERNAL_USER_DISABLE_FEATURES: "manage_password, deletion"
              indexer:
                REPO_INDEXER_ENABLED: true
              storage:
                STORAGE_TYPE: minio
                MINIO_BUCKET: forgejo-storage
                MINIO_USE_SSL: "true"
              database:
                DB_TYPE: postgres
              queue:
                TYPE: redis
                CONN_STR: redis://dragonfly.dragonfly-system.svc.cluster.local:6379?pool_size=100&idle_timeout=180s
              session:
                COOKIE_NAME: "git_session"
                PROVIDER: redis
                PROVIDER_CONFIG: redis://dragonfly.dragonfly-system.svc.cluster.local:6379?pool_size=100&idle_timeout=180s
                SESSION_LIFE_TIME: "1209600"
              cache:
                ENABLED: true
                ADAPTER: redis
                HOST: redis://dragonfly.dragonfly-system.svc.cluster.local:6379?pool_size=100&idle_timeout=180s
              repository:
                DISABLE_DOWNLOAD_SOURCE_ARCHIVES: "true"
              repository.signing:
                FORMAT: ssh
                SIGNING_KEY: /data/signing/ed25519.pub
                SIGNING_NAME: git.anurag.sh Instance
                SIGNING_EMAIL: noreply@git.anurag.sh
                INITIAL_COMMIT: pubkey
                CRUD_ACTIONS: pubkey, parentsigned
                WIKI: never
                MERGES: pubkey, approved
              oauth2_client:
                ENABLE_AUTO_REGISTRATION: "true"
              openid:
                ENABLE_OPENID_SIGNUP: "false"
              security:
                INSTALL_LOCK: "true"
              server:
                DOMAIN: git.anurag.sh
                ROOT_URL: https://git.anurag.sh/
                SSH_SERVER_HOST_KEYS: ssh/ssh_host_ed25519_key
              service:
                DISABLE_REGISTRATION: "true"
                ALLOW_ONLY_EXTERNAL_REGISTRATION: "true"
                ENABLE_INTERNAL_SIGNIN: "false"
                DEFAULT_KEEP_EMAIL_PRIVATE: "true"
                ENABLE_BASIC_AUTHENTICATION: "false"
              service.explore:
                REQUIRE_SIGNIN_VIEW: "true"
                DISABLE_USERS_PAGE: "false"
                DISABLE_ORGANIZATIONS_PAGE: "false"
                DISABLE_CODE_PAGE: "false"
              api:
                ENABLE_SWAGGER: "false"
              webhook:
                ALLOWED_HOST_LIST: "api.janitor-bot.svc.cluster.local,external"
              other:
                SHOW_FOOTER_VERSION: "false"
                SHOW_FOOTER_TEMPLATE_LOAD_TIME: "false"
                SHOW_FOOTER_POWERED_BY: "false"
                ENABLE_SITEMAP: "false"
                ENABLE_FEED: "false"
            additionalConfigFromEnvs:
              - name: FORGEJO__STORAGE__MINIO_ENDPOINT
                valueFrom:
                  secretKeyRef:
                    name: forgejo-managed-secrets
                    key: MINIO_ENDPOINT
              - name: FORGEJO__STORAGE__MINIO_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: forgejo-managed-secrets
                    key: MINIO_ACCESS_KEY_ID
              - name: FORGEJO__STORAGE__MINIO_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: forgejo-managed-secrets
                    key: MINIO_SECRET_ACCESS_KEY

              - name: FORGEJO__DATABASE__NAME
                valueFrom:
                  secretKeyRef:
                    name: forgejo-database-secret
                    key: PGDATABASE
              - name: FORGEJO__DATABASE__USER
                valueFrom:
                  secretKeyRef:
                    name: forgejo-database-secret
                    key: PGUSER
              - name: FORGEJO__DATABASE__HOST
                value: cloudnative-pg-cluster-pooler-rw.cnpg-system
              - name: FORGEJO__DATABASE__PASSWD
                valueFrom:
                  secretKeyRef:
                    name: forgejo-database-secret
                    key: PGPASSWORD
            metrics:
              enabled: true
              serviceMonitor:
                enabled: true
            oauth:
              - name: "authentik"
                provider: "openidConnect"
                existingSecret: forgejo-oauth-managed-secrets
                autoDiscoverUrl: "https://authentik.anurag.sh/application/o/forgejo/.well-known/openid-configuration"
                scopes: "email profile forgejo"
                requiredClaimName: forgejo
                groupClaimName: "forgejo"
                adminGroup: "admin"
                restrictedGroup: "restricted"
    - chart: app-template
      repoURL: oci://ghcr.io/bjw-s-labs/helm/app-template
      targetRevision: 5.0.1
      helm:
        releaseName: forgejo-runner
        valuesObject:
          defaultPodOptions:
            automountServiceAccountToken: true
          configMaps:
            config:
              suffix: config
              data:
                runner.yaml: |-
                  cache:
                    enabled: true
                    dir: /data/cache
                  container:
                    docker_host: "-"
                    workdir_parent: shared/workdir
                  host:
                    workdir_parent: /data/act
                  kubernetes:
                    namespace: forgejo
                    poll_timeout: 10m
                  log:
                    level: info
                  plugins:
                    k8s:
                      address: "unix:///plugin/forgejo-runner-k8s.sock"
                      options:
                        namespace: forgejo
                        poll_timeout: 10m
                  runner:
                    capacity: 4
                    labels:
                      - ubuntu-latest:k8s:/config/podspec-default.yaml
                      - default:k8s:/config/podspec-default.yaml
                      - docker:k8s:/config/podspec-dind.yaml
                      - multiarch:k8s:/config/podspec-dind.yaml
                    timeout: 3h
                podspec-default.yaml: |-
                  containers:
                    - env:
                        - name: DEBIAN_FRONTEND
                          value: noninteractive
                      image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04@sha256:4288050ddd71ac2e5f42465c474aec8b838792dec85bb284405db7c180138580
                      imagePullPolicy: IfNotPresent
                      name: main
                      resources:
                        limits:
                          cpu: 1500m
                          memory: 2Gi
                        requests:
                          cpu: 100m
                          memory: 256Mi
                  restartPolicy: Never
                podspec-dind.yaml: |-
                  initContainers:
                    - name: dind
                      image: docker:29-dind
                      args:
                        - --mtu=1280
                      securityContext:
                        privileged: true
                      restartPolicy: Always
                      env:
                        - name: DOCKER_TLS_CERTDIR
                          value: /certs
                      resources:
                        requests:
                          cpu: 100m
                          memory: 256Mi
                        limits:
                          cpu: 1500m
                          memory: 4Gi
                      volumeMounts:
                        - name: docker-storage
                          mountPath: /var/lib/docker
                        - name: docker-certs
                          mountPath: /certs
                      readinessProbe:
                        exec:
                          command:
                            - sh
                            - -c
                            - test -f /certs/client/ca.pem && test -f /certs/client/cert.pem && test -f /certs/client/key.pem
                        initialDelaySeconds: 2
                        periodSeconds: 1
                  containers:
                    - env:
                        - name: DEBIAN_FRONTEND
                          value: noninteractive
                        - name: DOCKER_HOST
                          value: tcp://localhost:2376
                        - name: DOCKER_TLS_VERIFY
                          value: "1"
                        - name: DOCKER_CERT_PATH
                          value: /certs/client
                      image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04@sha256:4288050ddd71ac2e5f42465c474aec8b838792dec85bb284405db7c180138580
                      imagePullPolicy: IfNotPresent
                      name: main
                      resources:
                        limits:
                          cpu: 1500m
                          memory: 2Gi
                        requests:
                          cpu: 100m
                          memory: 256Mi
                      volumeMounts:
                        - name: docker-certs
                          mountPath: /certs
                          readOnly: true
                  volumes:
                    - name: docker-storage
                      emptyDir: {}
                    - name: docker-certs
                      emptyDir: {}
                  restartPolicy: Never
          controllers:
            forgejo-runner:
              type: deployment
              replicas: 1
              annotations:
                reloader.stakater.com/auto: "true"
              pod:
                labels:
                  app.kubernetes.io/component: forgejo-runner
                securityContext:
                  fsGroup: 1000
                  fsGroupChangePolicy: OnRootMismatch
                  runAsGroup: 1000
                  runAsNonRoot: true
                  runAsUser: 1000
              containers:
                runner:
                  image:
                    repository: git.erwanleboucher.dev/eleboucher/runner
                    tag: sha-63d5504927ba6b9d511c0972beaf4ff5b3705f82@sha256:96972a9e96630a4d6114fe8afa5dc6fcb352167e44b9b23513bcc490b4ce4abe
                  command:
                    - sh
                    - -ec
                    - |
                      exec /bin/forgejo-runner daemon \
                        --config /config/runner.yaml \
                        --url "http://forgejo-http:3000" \
                        --uuid "$(cat /etc/forgejo-runner-secret/uuid)" \
                        --token-url file:///etc/forgejo-runner-secret/token
                  resources:
                    requests:
                      cpu: 5m
                      memory: 256Mi
                    limits:
                      memory: 512Mi
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    capabilities:
                      drop:
                        - ALL
                k8s-plugin:
                  image:
                    repository: git.erwanleboucher.dev/eleboucher/runner-k8s-plugin
                    tag: sha-f7ab06b75887e5497c9f9f9bef641aafb2ae3e1c@sha256:0e70ea2c9e794c2624f506341312e4e4a92903bd9f606a926e9bb4b1dc3645c1
                  args:
                    - --listen
                    - unix:///plugin/forgejo-runner-k8s.sock
                  resources:
                    requests:
                      cpu: 5m
                      memory: 32Mi
                    limits:
                      memory: 128Mi
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    capabilities:
                      drop:
                        - ALL
          rbac:
            roles:
              forgejo-runner:
                type: Role
                rules:
                  - apiGroups:
                      - ""
                    resources:
                      - "pods"
                    verbs:
                      - "list"
                      - "watch"
                      - "create"
                      - "get"
                      - "delete"
                  - apiGroups:
                      - ""
                    resources:
                      - "pods/exec"
                    verbs:
                      - "create"
                      - "get"
                  - apiGroups:
                      - ""
                    resources:
                      - "pods/log"
                    verbs:
                      - "list"
                      - "watch"
                      - "get"
            bindings:
              forgejo-runner:
                type: RoleBinding
                roleRef:
                  identifier: forgejo-runner
                subjects:
                  - identifier: forgejo-runner
          persistence:
            config:
              type: configMap
              identifier: config
              globalMounts:
                - path: /config
            runner-secret:
              type: secret
              name: forgejo-runner-secret
              globalMounts:
                - path: /etc/forgejo-runner-secret
                  readOnly: true
            plugins:
              type: emptyDir
              globalMounts:
                - path: /plugin
            tmpfs:
              type: emptyDir
              globalMounts:
                - path: /data
                  subPath: data
                - path: /tmp
                  subPath: tmp
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      path: system-components/forgejo
      kustomize: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: forgejo

operation:
  initiatedBy:
    username: github-actions
  sync:
    syncStrategy:
      hook: {}
