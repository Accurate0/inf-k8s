# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/gateway.envoyproxy.io/securitypolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: prometheus-oidc
  namespace: monitoring
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: prometheus
  oidc:
    provider:
      issuer: https://idm.anurag.sh/oauth2/openid/prometheus
    clientIDRef:
      name: kanidm-prometheus-oidc
    clientSecret:
      name: kanidm-prometheus-oidc
    redirectURL: https://prometheus.inf-k8s.net/oauth2/callback
    scopes:
      - openid
      - email
      - profile
