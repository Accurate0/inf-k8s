# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        internal-gateway-access: "true"
        shared-gateway-access: "true"
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - ServerSideApply=true
  project: system-components
  sources:
    - chart: k8s-http-routes
      repoURL: oci://ghcr.io/accurate0/charts/k8s-http-routes
      targetRevision: 2.1.0
      helm:
        valuesObject:
          routes:
            - name: authentik-external
              gateway:
                name: shared-gateway
                namespace: envoy-gateway-system
              hostnames:
                - authentik.anurag.sh
              rules:
                - backendRefs:
                    - group: ""
                      kind: Service
                      name: authentik-server
                      port: 80
                      weight: 1
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
            - name: authentik
              gateway:
                name: internal-gateway
                namespace: envoy-gateway-system
              hostnames:
                - authentik.inf-k8s.net
              rules:
                - backendRefs:
                    - group: ""
                      kind: Service
                      name: authentik-server
                      port: 80
                      weight: 1
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
    - chart: k8s-infisical-secrets
      repoURL: oci://ghcr.io/accurate0/charts/k8s-infisical-secrets
      targetRevision: 0.10.0
      helm:
        valuesObject:
          defaults:
            namespace: authentik
            projectSlug: authentik-bjrx
            resyncInterval: 900
          secrets:
            - name: authentik-secrets
              secretPath: /
              managedSecrets:
                - secretName: authentik-managed-secrets
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      path: system-components/authentik
    - chart: authentik
      repoURL: https://charts.goauthentik.io
      targetRevision: 2026.5.0
      helm:
        valuesObject:
          global:
            topologySpreadConstraints:
              - topologyKey: inf-k8s.net/location
                whenUnsatisfiable: ScheduleAnyway
                maxSkew: 1
            envFrom:
              - secretRef:
                  name: authentik-managed-secrets
          server:
            livenessProbe:
              failureThreshold: 3
              initialDelaySeconds: 5
              periodSeconds: 120
              successThreshold: 1
              timeoutSeconds: 3
            readinessProbe:
              failureThreshold: 3
              initialDelaySeconds: 5
              periodSeconds: 120
              successThreshold: 1
              timeoutSeconds: 3
            replicas: 2

  destination:
    server: https://kubernetes.default.svc
    namespace: authentik

operation:
  initiatedBy:
    username: github-actions
  sync:
    syncStrategy:
      hook: {}
