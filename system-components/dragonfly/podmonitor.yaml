# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: dragonfly
  labels:
    metrics: dragonfly
spec:
  selector:
    matchLabels:
      app: dragonfly
  podTargetLabels:
    - app
  podMetricsEndpoints:
    - port: admin
