# Default Anubis bot policy. Tweak rules as needed; see
# https://anubis.techaro.lol/docs/admin/policies for the schema.
bots:
  - name: well-known
    path_regex: ^/\.well-known/.*$
    action: ALLOW
  - name: favicon
    path_regex: ^/favicon\.ico$
    action: ALLOW
  - name: robots-txt
    path_regex: ^/robots\.txt$
    action: ALLOW
  - name: forgejo-api
    path_regex: ^/api/.*$
    action: ALLOW
  - name: git-protocol
    path_regex: \.git/(info/refs|git-upload-pack|git-receive-pack)$
    action: ALLOW
  - name: generic-browser
    user_agent_regex: Mozilla
    action: CHALLENGE
  - name: catchall
    action: ALLOW
