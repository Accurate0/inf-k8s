# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/core/service_v1.json
# Service fronts the anubis sidecar in the forgejo pod. Selectors mirror what
# the chart applies to the forgejo statefulset pods.
apiVersion: v1
kind: Service
metadata:
  name: forgejo-anubis
  namespace: forgejo
  labels:
    app.kubernetes.io/name: forgejo
    app.kubernetes.io/instance: forgejo-anubis
    app.kubernetes.io/component: anubis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: forgejo
    app.kubernetes.io/instance: forgejo
  ports:
    - name: http
      port: 8923
      targetPort: anubis-http
    - name: metrics
      port: 9090
      targetPort: anubis-metrics
---
# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: forgejo-anubis
  namespace: forgejo
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo
      app.kubernetes.io/instance: forgejo-anubis
      app.kubernetes.io/component: anubis
  endpoints:
    - port: metrics
      interval: 15s
      scrapeTimeout: 10s
---
# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo
  namespace: forgejo
  annotations:
    external-dns.alpha.kubernetes.io/managed: "true"
    external-dns.alpha.kubernetes.io/target: external.inf-k8s.net
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public-gateway
      namespace: envoy-gateway-system
  hostnames:
    - git.anurag.sh
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: 90s
        backendRequest: 90s
      backendRefs:
        - group: ""
          kind: Service
          name: forgejo-anubis
          port: 8923
          weight: 1
