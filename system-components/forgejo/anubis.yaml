# Service fronts the anubis sidecar in the forgejo pod. Selectors mirror what
# the chart applies to the forgejo statefulset pods.
apiVersion: v1
kind: Service
metadata:
  name: forgejo-anubis
  namespace: forgejo
  labels:
    app.kubernetes.io/name: forgejo
    app.kubernetes.io/instance: forgejo
    app.kubernetes.io/component: anubis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: forgejo
    app.kubernetes.io/instance: forgejo
  ports:
    - name: http
      port: 8923
      targetPort: anubis-http
---
# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo
  namespace: forgejo
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gateway
      namespace: envoy-gateway-system
  hostnames:
    - git.anurag.sh
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: 90s
        backendRequest: 90s
      backendRefs:
        - group: ""
          kind: Service
          name: forgejo-anubis
          port: 8923
          weight: 1
