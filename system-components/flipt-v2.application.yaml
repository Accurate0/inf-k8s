# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flipt-v2
  namespace: argocd
spec:
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        inf-k8s.net/infisical-secrets: "true"
        internal-gateway-access: "true"
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: system-components
  sources:
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      path: system-components/flipt
    - chart: k8s-http-routes
      repoURL: oci://ghcr.io/accurate0/charts/k8s-http-routes
      targetRevision: 2.1.0
      helm:
        valuesObject:
          routes:
            - name: flipt
              gateway:
                name: internal-gateway
                namespace: envoy-gateway-system
              hostnames:
                - flipt.inf-k8s.net
              rules:
                - backendRefs:
                    - group: ""
                      kind: Service
                      name: flipt-v2
                      port: 8080
                      weight: 1
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
    - chart: flipt-v2
      repoURL: https://helm.flipt.io
      targetRevision: 2.9.3
      helm:
        valuesObject:
          replicaCount: 1
          ingress:
            enabled: false
          metrics:
            serviceMonitor:
              enabled: true
          flipt:
            envFrom:
              - secretRef:
                  name: flipt-managed-secrets
              - secretRef:
                  name: kanidm-flipt-oidc
            config:
              environments:
                production:
                  name: "Production"
                  description: "Production environment"
                  storage: github
              cors:
                enabled: true
                allowed_origins:
                  - https://flipt.inf-k8s.net
              credentials:
                github:
                  type: access_token
                  access_token: "${env:FLIPT_GITHUB_ACCESS_TOKEN}"
              storage:
                github:
                  remote: "https://github.com/Accurate0/flipt-state.git"
                  branch: "main"
                  poll_interval: "30s"
                  credentials: "github"
              analytics:
                storage:
                  prometheus:
                    enabled: true
                    url: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
              authentication:
                required: true
                exclude:
                  evaluation: true
                session:
                  storage:
                    type: redis
                    redis:
                      mode: single
                      port: 6379
                      host: dragonfly.dragonfly-system.svc.cluster.local
                  domain: "flipt.inf-k8s.net"
                  secure: true
                  csrf:
                    key: "${env:FLIPT_CSRF_KEY}"
                methods:
                  oidc:
                    enabled: true
                    providers:
                      kanidm:
                        issuer_url: "https://idm.anurag.sh/oauth2/openid/flipt"
                        client_id: "${env:FLIPT_KANIDM_CLIENT_ID}"
                        client_secret: "${env:FLIPT_KANIDM_CLIENT_SECRET}"
                        redirect_address: "https://flipt.inf-k8s.net"
                        scopes:
                          - openid
                          - email
                          - profile
                          - groups
                  github:
                    enabled: false
                    client_id: "${env:FLIPT_GITHUB_CLIENT_ID}"
                    client_secret: "${env:FLIPT_GITHUB_CLIENT_SECRET}"
                    redirect_address: "https://flipt.inf-k8s.net"
                    scopes:
                      - user:email
                  token:
                    enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: flipt-v2

operation:
  initiatedBy:
    username: github-actions
  sync:
    syncStrategy:
      hook: {}
