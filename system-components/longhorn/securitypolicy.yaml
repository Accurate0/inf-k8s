# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/gateway.envoyproxy.io/securitypolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: longhorn-oidc
  namespace: longhorn-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: longhorn
  oidc:
    provider:
      issuer: https://idm.anurag.sh/oauth2/openid/longhorn
    clientIDRef:
      name: kanidm-longhorn-oidc
    clientSecret:
      name: kanidm-longhorn-oidc
    redirectURL: https://longhorn.inf-k8s.net/oauth2/callback
    scopes:
      - openid
      - email
      - profile
