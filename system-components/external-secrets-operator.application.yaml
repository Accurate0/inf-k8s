# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: system-components
  sources:
    - chart: external-secrets
      repoURL: oci://ghcr.io/external-secrets/charts/external-secrets
      targetRevision: 2.6.0
      helm:
        valuesObject:
          installCRDs: true
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      path: system-components/external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

operation:
  initiatedBy:
    username: github-actions
  sync:
    syncStrategy:
      hook: {}
