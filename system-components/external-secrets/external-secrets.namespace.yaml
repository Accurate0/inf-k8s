# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/core/namespace_v1.json
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    # opt in to universal-auth-credentials replication (see
    # universal-auth-replicator.clusterexternalsecret.yaml) so the infisical
    # SecretStore below can authenticate
    inf-k8s.net/infisical-secrets: "true"
