# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kanidm
  namespace: argocd
spec:
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        gateway.inf-k8s.net/anurag-sh: "true"
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: system-components
  sources:
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      path: system-components/kanidm
  destination:
    server: https://kubernetes.default.svc
    namespace: kanidm

operation:
  initiatedBy:
    username: github-actions
  sync:
    syncStrategy:
      hook: {}
