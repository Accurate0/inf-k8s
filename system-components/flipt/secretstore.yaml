apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: infisical-flipt-secrets
  namespace: flipt-v2
spec:
  provider:
    infisical:
      hostAPI: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080/api
      auth:
        universalAuthCredentials:
          clientId:
            name: universal-auth-credentials
            key: clientId
          clientSecret:
            name: universal-auth-credentials
            key: clientSecret
      secretsScope:
        projectSlug: flipt-v2-abs6
        environmentSlug: prod
        secretsPath: /
        recursive: false
