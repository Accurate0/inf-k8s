apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-home
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: default
  sources:
    - chart: k8s-http-routes
      repoURL: oci://ghcr.io/accurate0/charts/k8s-http-routes
      targetRevision: 2.1.0
      helm:
        valuesObject:
          routes:
            - name: inf-k8s-route
              gateway:
                name: internal-gateway
                namespace: envoy-gateway-system
              hostnames:
                - inf-k8s.net
              rules:
                - backendRefs:
                    - name: ingress-home
                      port: 80
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      name: application
      path: services/ingress-home/manifests
      kustomize:
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-home
operation:
  initiatedBy:
    username: github-actions
  sync:
    prune: true
    syncStrategy:
      hook: {}
