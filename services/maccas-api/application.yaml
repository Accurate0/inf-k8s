apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maccas-api
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: default
  sources:
    - chart: k8s-infisical-secrets
      repoURL: oci://ghcr.io/accurate0/charts/k8s-infisical-secrets
      targetRevision: 0.10.0
      helm:
        valuesObject:
          defaults:
            namespace: maccas-api
            projectSlug: maccas-api-576-r
            resyncInterval: 900
          secrets:
            - name: maccas-api-secret
              secretPath: /api
              managedSecrets:
                - secretName: maccas-api-managed-secrets
            - name: maccas-common-secret
              secretPath: /
              managedSecrets:
                - secretName: maccas-common-managed-secrets
            - name: maccas-web-secret
              secretPath: /web
              managedSecrets:
                - secretName: maccas-web-managed-secrets
            - name: maccas-migration-secret
              secretPath: /migration
              managedSecrets:
                - secretName: maccas-migration-managed-secrets
    - chart: k8s-http-routes
      repoURL: oci://ghcr.io/accurate0/charts/k8s-http-routes
      targetRevision: 2.1.0
      helm:
        valuesObject:
          routes:
            - name: maccas-web-route
              gateway:
                name: shared-gateway
                namespace: envoy-gateway-system
              hostnames:
                - maccas.one
              ratelimit:
                rules:
                  - clientSelectors:
                      - headers:
                          - name: CF-Connecting-IP
                            type: Distinct
                    limit:
                      requests: 5
                      unit: Second
              rules:
                - backendRefs:
                    - name: maccas-web
                      port: 3000
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
            - name: graphql-maccas-route
              gateway:
                name: shared-gateway
                namespace: envoy-gateway-system
              hostnames:
                - graphql.maccas.one
              rules:
                - backendRefs:
                    - name: maccas-api
                      port: 8000
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      name: application
      path: services/maccas-api/manifests
      kustomize:

  destination:
    server: https://kubernetes.default.svc
    namespace: maccas-api
operation:
  initiatedBy:
    username: github-actions
  sync:
    prune: true
    syncStrategy:
      hook: {}
