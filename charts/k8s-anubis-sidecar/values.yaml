namespace: default

image:
  repository: ghcr.io/techarohq/anubis
  tag: v1.13.0
  digest: sha256:7fd4c947f830f0ccad85dda41d33e711f27ca043109633eea60190a573c34919
  pullPolicy: IfNotPresent

replicas: 1

# Service that Anubis will proxy traffic to (used to build TARGET).
target:
  name: ""
  port: 5000
  scheme: http

# ED25519 private key. Provide one of:
#   - secret.secretName: existing secret with key ED25519_PRIVATE_KEY_HEX
#   - secret.generate: true — chart generates a 64-char hex key and stores it
#     in a Secret named "anubis-key" (re-uses the existing value if present)
secret:
  secretName: anubis-key
  generate: false

service:
  type: ClusterIP
  port: 8080
  metricsPort: 9090

# Any Anubis config option settable via env var. Keys are passed verbatim,
# so use the env var name exactly (e.g. DIFFICULTY, POLICY_FNAME, COOKIE_DOMAIN).
# See https://anubis.techaro.lol/docs/admin/installation for the full list.
# BIND, METRICS_BIND, TARGET and ED25519_PRIVATE_KEY_HEX are managed by the chart
# and should be set via the dedicated values above.
env:
  DIFFICULTY: "4"
  SERVE_ROBOTS_TXT: "true"
  OG_PASSTHROUGH: "true"
  OG_EXPIRY_TIME: "24h"

# Mount a policy file and point POLICY_FNAME at it. Provide one of:
#   - policy.inline: raw policy content; chart renders a ConfigMap
#   - policy.configMapName: name of a pre-existing ConfigMap
policy:
  enabled: false
  inline: ""
  configMapName: ""
  fileName: botPolicy.yaml
  mountPath: /data/cfg

# Extra env entries (full EnvVar objects) — use for valueFrom refs etc.
extraEnv: []

# Extra volumes / mounts for advanced setups.
extraVolumes: []
extraVolumeMounts: []

resources:
  limits:
    cpu: 750m
    memory: 256Mi
  requests:
    cpu: 250m
    memory: 256Mi
