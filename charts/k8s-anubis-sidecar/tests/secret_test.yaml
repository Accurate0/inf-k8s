suite: secret
templates:
  - secret.yaml
tests:
  - it: does not render a secret by default
    set:
      target.name: api
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a secret with a 64-char hex key when secret.generate is true
    set:
      target.name: api
      secret.generate: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: anubis-key
      - matchRegex:
          path: stringData.ED25519_PRIVATE_KEY_HEX
          pattern: "^[a-f0-9]{64}$"
