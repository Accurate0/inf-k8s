suite: deployment
templates:
  - deployment.yaml
tests:
  - it: fails when target.name is unset
    set:
      target.name: ""
    asserts:
      - failedTemplate:
          errorMessage: "target.name is required"

  - it: builds TARGET from target service and namespace
    set:
      namespace: prod
      target.name: api
      target.port: 8000
      target.scheme: http
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TARGET
            value: "http://api.prod.svc.cluster.local:8000"

  - it: pins image to tag@digest
    set:
      target.name: api
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr.io/techarohq/anubis:v[0-9.]+@sha256:[a-f0-9]{64}$"

  - it: references existing secret by default
    set:
      target.name: api
      secret.secretName: my-custom-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[3].valueFrom.secretKeyRef.name
          value: my-custom-secret

  - it: references generated secret when secret.generate is true
    set:
      target.name: api
      secret.generate: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[3].valueFrom.secretKeyRef.name
          value: anubis-key

  - it: renders custom env entries from the env map
    set:
      target.name: api
      env:
        DIFFICULTY: "7"
        COOKIE_DOMAIN: example.com
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DIFFICULTY
            value: "7"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: COOKIE_DOMAIN
            value: "example.com"

  - it: mounts policy volume and sets POLICY_FNAME when policy.enabled
    set:
      target.name: api
      policy.enabled: true
      policy.configMapName: my-policy
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POLICY_FNAME
            value: "/data/cfg/botPolicy.yaml"
      - contains:
          path: spec.template.spec.volumes
          content:
            name: policy
            configMap:
              name: my-policy
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: policy
            mountPath: /data/cfg
            readOnly: true

  - it: uses generated configmap when policy.inline is set
    set:
      target.name: api
      policy.enabled: true
      policy.inline: "bots: []"
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: policy
            configMap:
              name: anubis-policy

  - it: applies runAsNonRoot security context
    set:
      target.name: api
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000
