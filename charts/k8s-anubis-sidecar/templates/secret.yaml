{{- if .Values.secret.generate }}
{{- $existing := (lookup "v1" "Secret" .Values.namespace "anubis-key") }}
{{- $key := "" }}
{{- if and $existing $existing.data (index $existing.data "ED25519_PRIVATE_KEY_HEX") }}
{{- $key = index $existing.data "ED25519_PRIVATE_KEY_HEX" | b64dec }}
{{- else }}
{{- $key = randAlphaNum 64 | sha256sum }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: anubis-key
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  ED25519_PRIVATE_KEY_HEX: {{ $key | quote }}
{{- end }}
