---
- name: Storage
  become: true
  become_user: root
  block:
    - name: Check if mergerfs is installed
      ansible.builtin.command: pacman -Q mergerfs
      register: mergerfs_query
      changed_when: false
      failed_when: false

    - name: Install mergerfs
      become: false
      ansible.builtin.command: paru -S --needed --noconfirm mergerfs
      when: mergerfs_query.rc != 0

    - name: Create per-drive mount points
      ansible.builtin.file:
        path: "{{ media_disks_root }}/{{ item.name }}"
        state: directory
        mode: "0755"
      loop: "{{ media_drives }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Mount media drives
      ansible.posix.mount:
        src: "{{ item.device }}"
        path: "{{ media_disks_root }}/{{ item.name }}"
        fstype: "{{ item.fstype | default('ext4') }}"
        opts: "{{ item.opts | default('defaults,noatime') }}"
        state: mounted
      loop: "{{ media_drives }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Create mergerfs pool mount point
      ansible.builtin.file:
        path: "{{ media_pool_mount }}"
        state: directory
        mode: "0755"

    - name: Mount mergerfs pool
      ansible.posix.mount:
        src: "{{ media_disks_root }}/*"
        path: "{{ media_pool_mount }}"
        fstype: mergerfs
        opts: "{{ media_pool_options }}{% for drive in media_drives %},x-systemd.requires={{ media_disks_root }}/{{ drive.name }}{% endfor %}"
        state: mounted
      register: mergerfs_mount
      notify: Remount mergerfs pool

    - name: Reload systemd for regenerated mount units
      ansible.builtin.systemd_service:
        daemon_reload: true
      when: mergerfs_mount is changed

    - name: Create media library directories
      ansible.builtin.file:
        path: "{{ media_pool_mount }}/{{ item }}"
        state: directory
        owner: "{{ media_puid }}"
        group: "{{ media_pgid }}"
        mode: "0775"
      loop:
        - tv
        - movies
        - anime
        - downloads

    - name: Create app config directories
      ansible.builtin.file:
        path: "{{ media_config_root }}/config/{{ item }}"
        state: directory
        owner: "{{ media_puid }}"
        group: "{{ media_pgid }}"
        mode: "0775"
      loop: "{{ media_apps }}"
