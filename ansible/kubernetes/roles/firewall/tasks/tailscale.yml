# SPDX-License-Identifier: MIT-0
---
- name: Allow all in tailscale0
  community.general.ufw:
    rule: allow
    interface: tailscale0
    direction: in

- name: Allow all out tailscale0
  community.general.ufw:
    rule: allow
    interface: tailscale0
    direction: out

- name: Allow Tailscale WireGuard (direct connections)
  community.general.ufw:
    rule: allow
    port: 41641
    proto: udp

- name: Allow Tailscale STUN
  community.general.ufw:
    rule: allow
    port: 3478
    proto: udp
