---
- name: Restart K3S
  become: true
  become_user: root
  become_method: sudo
  ansible.builtin.systemd_service:
    name: "{{ k3s_systemd_service }}"
    state: "restarted"

- name: Restart multipathd
  ansible.builtin.systemd_service:
    name: "multipathd"
    state: "restarted"
