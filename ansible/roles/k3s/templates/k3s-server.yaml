vpn-auth: "name=tailscale,joinKey={{ k3s_tailscale_auth_key }}"
disable:
  - traefik
node-external-ip: "{{ tailscale_ip_result.stdout }}"
node-ip: "{{ tailscale_ip_result.stdout }}"
server: {{ k3s_control_ip }}
tls-san:
  - "{{ hostvars['k8s-optiplex-5'].tailscale_ip }}"
  - "inf-k8s.net"
etcd-expose-metrics: true
token: "{{ k3s_cluster_token }}"
kubelet-arg:
  - "image-gc-high-threshold=50"
  - "image-gc-low-threshold=20"
  - "maximum-dead-containers=0"
