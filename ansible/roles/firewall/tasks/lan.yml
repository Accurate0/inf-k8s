---
- name: Allow LAN traffic (from)
  community.general.ufw:
    rule: allow
    from: "{{ item }}"
  loop: "{{ local_lans }}"
  when: firewall_allow_local_lan

- name: Allow LAN traffic (to)
  community.general.ufw:
    rule: allow
    to: "{{ item }}"
  loop: "{{ local_lans }}"
  when: firewall_allow_local_lan
