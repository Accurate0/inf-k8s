apiVersion: apps/v1
kind: Deployment
metadata:
  name: ozb-finder
  namespace: ozbargain
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  selector:
    matchLabels:
      app: ozb-finder
  replicas: 1
  template:
    metadata:
      labels:
        app: ozb-finder
    spec:
      containers:
        - name: ozb-finder
          image: ghcr.io/accurate0/ozb-finder
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: ozb-managed-secrets
