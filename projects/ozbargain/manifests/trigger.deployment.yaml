# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/apps/deployment_v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ozb-trigger
  namespace: ozbargain
  annotations:
    secrets.infisical.com/auto-reload: "true"
spec:
  selector:
    matchLabels:
      app: ozb-trigger
  replicas: 1
  template:
    metadata:
      labels:
        app: ozb-trigger
    spec:
      containers:
        - name: ozb-trigger
          image: ghcr.io/accurate0/ozb-trigger
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 15m
              memory: 16Mi
          envFrom:
            - secretRef:
                name: ozb-managed-secrets
