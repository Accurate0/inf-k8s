# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maccas-api
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: projects
  sources:
    - chart: k8s-secrets
      repoURL: oci://ghcr.io/accurate0/charts/k8s-secrets
      targetRevision: 0.3.0
      helm:
        valuesObject:
          defaults:
            namespace: maccas-api
            projectSlug: maccas-api-576-r
            resyncInterval: 900
          secrets:
            - name: maccas-api-secret
              secretPath: /api
              managedSecrets:
                - secretName: maccas-api-managed-secrets
            - name: maccas-common-secret
              secretPath: /
              managedSecrets:
                - secretName: maccas-common-managed-secrets
            - name: maccas-web-secret
              secretPath: /web
              managedSecrets:
                - secretName: maccas-web-managed-secrets
            - name: maccas-migration-secret
              secretPath: /migration
              managedSecrets:
                - secretName: maccas-migration-managed-secrets
    - chart: k8s-http-routes
      repoURL: oci://ghcr.io/accurate0/charts/k8s-http-routes
      targetRevision: 2.2.0
      helm:
        valuesObject:
          routes:
            - name: maccas-web-route
              gateway:
                name: public-gateway
                namespace: envoy-gateway-system
              annotations:
                external-dns.alpha.kubernetes.io/managed: "true"
                external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
              hostnames:
                - maccas.one
              ratelimit:
                rules:
                  - clientSelectors:
                      - headers:
                          - name: CF-Connecting-IP
                            invert: false
                            type: Distinct
                    limit:
                      requests: 5
                      unit: Second
              rules:
                - backendRefs:
                    - group: ""
                      kind: Service
                      name: maccas-web
                      port: 3000
                      weight: 1
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      name: application
      path: projects/maccas-api/manifests
      kustomize: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: maccas-api
operation:
  initiatedBy:
    username: github-actions
  sync:
    prune: true
    syncStrategy:
      hook: {}
