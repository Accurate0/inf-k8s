# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/core/service_v1.json
apiVersion: v1
kind: Service
metadata:
  name: maccas-recommendations
  namespace: maccas-api
spec:
  selector:
    app: maccas-recommendations
  ports:
    - name: api
      protocol: TCP
      port: 8003
      targetPort: 8003
    - name: clustering
      protocol: TCP
      port: 8004
      targetPort: 8004
