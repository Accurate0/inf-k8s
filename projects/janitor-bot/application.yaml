# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: janitor-bot
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: default
  sources:
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      path: projects/janitor-bot/manifests
      kustomize:
    - chart: k8s-http-routes
      repoURL: oci://ghcr.io/accurate0/charts/k8s-http-routes
      targetRevision: 2.1.0
      helm:
        valuesObject:
          routes:
            - name: janitor-bot-route
              gateway:
                name: internal-gateway
                namespace: envoy-gateway-system
              hostnames:
                - janitor-bot.inf-k8s.net
              ratelimit:
                rules:
                  - clientSelectors:
                      - headers:
                          - name: CF-Connecting-IP
                            invert: false
                            type: Distinct
                    limit:
                      requests: 5
                      unit: Second
              rules:
                - backendRefs:
                    - group: ""
                      kind: Service
                      name: api
                      port: 80
                      weight: 1
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
  destination:
    server: https://kubernetes.default.svc
    namespace: janitor-bot
operation:
  initiatedBy:
    username: github-actions
  sync:
    prune: true
    syncStrategy:
      hook: {}
