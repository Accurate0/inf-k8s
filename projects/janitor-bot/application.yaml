apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: janitor-bot
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: default
  source:
    repoURL: https://github.com/Accurate0/inf-k8s.git
    path: projects/janitor-bot/manifests
    kustomize:
  destination:
    server: https://kubernetes.default.svc
    namespace: janitor-bot
operation:
  initiatedBy:
    username: github-actions
  sync:
    prune: true
    syncStrategy:
      hook: {}
