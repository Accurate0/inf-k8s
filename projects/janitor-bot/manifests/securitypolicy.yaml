# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/gateway.envoyproxy.io/securitypolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: janitor-bot-allow-all
  namespace: janitor-bot
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: janitor-bot-route
  authorization:
    defaultAction: Allow
---
# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/gateway.envoyproxy.io/securitypolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: janitor-bot-admin-tailscale-only
  namespace: janitor-bot
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: janitor-bot-admin-route
  authorization:
    defaultAction: Deny
    rules:
      - action: Allow
        principal:
          clientCIDRs:
            - 100.64.0.0/10
