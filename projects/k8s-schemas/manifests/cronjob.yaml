apiVersion: batch/v1
kind: CronJob
metadata:
  name: k8s-schemas
  namespace: k8s-schemas
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: k8s-schemas
          restartPolicy: OnFailure
          containers:
            - name: k8s-schemas
              image: ghcr.io/accurate0/k8s-schemas
              imagePullPolicy: Always
              envFrom:
                - secretRef:
                    name: k8s-schemas-managed-secrets
              env:
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: k8s-schemas-managed-secrets
                      key: S3_BUCKET
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: k8s-schemas-managed-secrets
                      key: S3_ENDPOINT
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 512Mi
