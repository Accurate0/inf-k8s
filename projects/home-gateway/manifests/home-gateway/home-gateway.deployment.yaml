# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/apps/deployment_v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-gateway
  namespace: home-gateway
spec:
  selector:
    matchLabels:
      app: home-gateway
  replicas: 1
  template:
    metadata:
      labels:
        app: home-gateway
    spec:
      hostAliases:
        - ip: "10.0.2.249"
          hostnames:
            - home.internal
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: inf-k8s.net/location
                    operator: In
                    values:
                      - perth
      containers:
        - name: home-gateway
          image: ghcr.io/accurate0/home-gateway
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 30m
              memory: 336Mi
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /v1/health
              port: 8000
              scheme: HTTP
            initialDelaySeconds: 3
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 1
          env:
            - name: FEATURE_FLAGS_URL
              value: http://api.feature-flags.svc.cluster.local:50051
            - name: SOLAR_API_BASE
              value: http://solar-panel-api.solar-panels.svc.cluster.local:8000/api
            - name: BOM_API_BASE
              value: http://bom-api.bom.svc.cluster.local:8000
            - name: OTEL_TRACING_URL
              value: http://monitoring-tempo.monitoring.svc.cluster.local:4318/v1/traces
            - name: HOME_ASSISTANT_URL
              value: http://home.internal
          envFrom:
            - secretRef:
                name: home-gateway-managed-secrets
            - secretRef:
                name: home-gateway-database-secret
          ports:
            - containerPort: 8000
