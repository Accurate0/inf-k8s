# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/apps/deployment_v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anurag-sh
  namespace: anurag-sh
spec:
  selector:
    matchLabels:
      app: anurag-sh
  replicas: 1
  template:
    metadata:
      labels:
        app: anurag-sh
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: anurag-sh
          image: ghcr.io/accurate0/anurag-sh
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
          ports:
            - containerPort: 3000
