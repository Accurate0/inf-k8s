# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: anurag-sh
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: projects
  sources:
    - chart: k8s-http-routes
      repoURL: oci://ghcr.io/accurate0/charts/k8s-http-routes
      targetRevision: 2.1.0
      helm:
        valuesObject:
          routes:
            - name: anurag-sh-route
              gateway:
                name: shared-gateway
                namespace: envoy-gateway-system
              hostnames:
                - anurag.sh
                - anurag.id.au
              rules:
                - backendRefs:
                    - group: ""
                      kind: Service
                      name: anurag-sh
                      port: 80
                      weight: 1
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      name: application
      path: projects/anurag-sh/manifests
      kustomize:
  destination:
    server: https://kubernetes.default.svc
    namespace: anurag-sh
operation:
  initiatedBy:
    username: github-actions
  sync:
    prune: true
    syncStrategy:
      hook: {}
