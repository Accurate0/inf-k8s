# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/apps/deployment_v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tldr-bot
  namespace: tldr-bot
spec:
  selector:
    matchLabels:
      app: tldr-bot
  replicas: 1
  template:
    metadata:
      labels:
        app: tldr-bot
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tldr-bot
          image: ghcr.io/accurate0/tldr-bot
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          envFrom:
            - secretRef:
                name: tldr-bot-managed-secrets
          env:
            - name: OPENAI_API_BASE
              value: http://api.litellm.svc.cluster.local/v1
