apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tldr-bot
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: default
  sources:
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      name: application
      path: projects/tldr-bot/manifests
      kustomize:
  destination:
    server: https://kubernetes.default.svc
    namespace: tldr-bot
operation:
  initiatedBy:
    username: github-actions
  sync:
    prune: true
    syncStrategy:
      hook: {}
