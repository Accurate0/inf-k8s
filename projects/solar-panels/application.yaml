# yaml-language-server: $schema=https://k8s-schemas.anurag.sh/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solar-panels
  namespace: argocd
spec:
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
  project: projects
  sources:
    - chart: k8s-http-routes
      repoURL: oci://ghcr.io/accurate0/charts/k8s-http-routes
      targetRevision: 2.1.0
      helm:
        valuesObject:
          routes:
            - name: solar-panels-route
              gateway:
                name: shared-gateway
                namespace: envoy-gateway-system
              hostnames:
                - solar-panels.anurag.sh
              rules:
                - backendRefs:
                    - group: ""
                      kind: Service
                      name: solar-panel-web
                      port: 3000
                      weight: 1
                  matches:
                    - path:
                        type: PathPrefix
                        value: /
                - backendRefs:
                    - group: ""
                      kind: Service
                      name: solar-panel-api
                      port: 8000
                      weight: 1
                  matches:
                    - path:
                        type: PathPrefix
                        value: /api
    - repoURL: https://github.com/Accurate0/inf-k8s.git
      name: application
      path: projects/solar-panels/manifests
      kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: solar-panels
operation:
  initiatedBy:
    username: github-actions
  sync:
    prune: true
    syncStrategy:
      hook: {}
